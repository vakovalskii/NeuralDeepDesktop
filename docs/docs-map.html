E.md", "area": "(root)", "title": "Neural Deep Desktop", "size": 4648, "html": "<h1 id=\"neural-deep-desktop\">Neural Deep Desktop<\/h1>\n<p><strong>A very light desktop wrapper over a full-power agent harness.<\/strong><\/p>\n<p><img alt=\"Neural Deep Desktop\" src=\"docs/img/neuraldeep-desktop.png\"><\/p>\n<p>Hermes Agent is the <strong>core<\/strong> (memory, skills, planning, orchestration). It pulls in\n<strong>ndcode<\/strong> (NeuralDeepCode — your MIT fork of opencode) as the coding worker when needed.\nBoth route every model call through <strong>one<\/strong> OpenAI‑compatible proxy (the NeuralDeep hub).\nThe desktop itself is a thin <strong>Tauri<\/strong> shell — chat + minimal settings — that spawns and\nmanages the backend.<\/p>\n<pre><code>┌─ Neural Deep.app  (LIGHT WRAPPER — Tauri ~10 MB) ───────────────────────┐\n│   Thin shell: streaming chat (SSE) + minimal settings. Spawns backend.  │\n│      │ HTTP + SSE                                                       │\n│      ▼                                                                  │\n│   FULL HARNESS (provisioned into app-data on first run):               │\n│     Hermes Agent (official, headless) ──skill &quot;ndcode&quot;──▶ ndcode run    │\n│      │                                                                  │\n└──────┼──────────────── both → one proxy ───────────────────────────────┘\n       ▼\n   NeuralDeep hub  (OpenAI-compatible: one base URL + key)\n<\/code><\/pre>\n<h2 id=\"north-star\">North star<\/h2>\n<ul>\n<li><strong>Full harness, thin wrapper.<\/strong> Users get the <em>complete<\/em> Hermes + ndcode power, not a\n  stripped toy. The wrapper stays minimal and fast.<\/li>\n<li><strong>Hermes is the brain.<\/strong> ndcode is a tool Hermes calls — not a peer. This is Hermes'\n  native pattern (it ships an opencode orchestration skill).<\/li>\n<li><strong>One proxy.<\/strong> Hermes and ndcode both point at the NeuralDeep hub. Centralized models,\n  keys, routing, cost.<\/li>\n<li><strong>Easy to package.<\/strong> Light installer (Tauri shell + ndcode native binary + <code>uv<\/code>); the\n  heavy Python harness is provisioned on first run, not stuffed into the installer.<\/li>\n<li><strong>MIT all the way down → sellable<\/strong> under our own brand. See <code>THIRD_PARTY_LICENSES.md<\/code>.<\/li>\n<\/ul>\n<h2 id=\"component-verdict-build-vs-adopt\">Component verdict (build-vs-adopt)<\/h2>\n<table>\n<thead>\n<tr>\n<th>Layer<\/th>\n<th>Decision<\/th>\n<th>Source<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Core harness<\/td>\n<td><strong>Adopt<\/strong> official <code>NousResearch/hermes-agent<\/code> (Python, MIT), run headless<\/td>\n<td>upstream<\/td>\n<\/tr>\n<tr>\n<td>Backend launch/transport<\/td>\n<td><strong>Lift<\/strong> the backend layer from <code>fathah/hermes-desktop<\/code> (MIT) — provisioning + SSE chat; drop its Electron UI<\/td>\n<td><code>fathah/hermes-desktop<\/code><\/td>\n<\/tr>\n<tr>\n<td>Coding worker<\/td>\n<td><strong>Adopt<\/strong> <code>vakovalskii/NeuralDeepCode<\/code> (ndcode, MIT fork of opencode) via a Hermes skill<\/td>\n<td>your repo<\/td>\n<\/tr>\n<tr>\n<td>Model proxy<\/td>\n<td><strong>External<\/strong> NeuralDeep hub (OpenAI-compatible)<\/td>\n<td>yours<\/td>\n<\/tr>\n<tr>\n<td>Desktop wrapper<\/td>\n<td><strong>Build<\/strong> thin (lift the Tauri shell + Developer ID signing from <code>NeuralDeskApp<\/code>)<\/td>\n<td>ours<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"status-native-tauri-desktop-app-running\">Status: native Tauri desktop app running ✅<\/h2>\n<p>The thin wrapper runs as a <strong>native Tauri desktop app<\/strong> over the <strong>full Hermes harness<\/strong>,\nwith model calls routed through the <strong>NeuralDeep hub free tier<\/strong>. Proven end-to-end in the\nnative window (Rust host → Hermes <code>:8642<\/code> → <code>api.neuraldeep.ru/v1<\/code> → streamed back) —\nsee <a href=\"tauri-window-chat.png\"><code>tauri-window-chat.png<\/code><\/a> (native) and\n<a href=\"neuraldeep-desktop-devrun.png\"><code>neuraldeep-desktop-devrun.png<\/code><\/a> (browser dev).<\/p>\n<pre><code class=\"language-bash\">hermes gateway                          # full Hermes backend → OpenAI API on :8642\ncd app &amp;&amp; bun install &amp;&amp; bun run tauri:dev   # native &quot;Neural Deep&quot; window (Rust host)\n# or, browser-only dev: bun run dev    → http://127.0.0.1:5173\n<\/code><\/pre>\n<p>The Tauri <strong>Rust host<\/strong> (<code>app/src-tauri/<\/code>) spawns/supervises the Hermes gateway and streams\nchat into the webview over a <code>Channel<\/code> — Rust is the trusted loopback client, so no\nCORS/Origin gate and the key never reaches the frontend.<\/p>\n<ul>\n<li><strong>App:<\/strong> <a href=\"app/\"><code>app/<\/code><\/a> — thin React/Vite chat shell (<a href=\"app/README.md\"><code>app/README.md<\/code><\/a>).<\/li>\n<li><strong>Backend spec:<\/strong> <a href=\"docs/reference/hermes-backend.md\"><code>docs/reference/hermes-backend.md<\/code><\/a> (transport, single proxy, integration).<\/li>\n<li><strong>Packaging/signing:<\/strong> <a href=\"docs/reference/packaging.md\"><code>docs/reference/packaging.md<\/code><\/a> · <strong>Verification + Q1–Q10:<\/strong> <a href=\"docs/reference/verification.md\"><code>docs/reference/verification.md<\/code><\/a>.<\/li>\n<li><strong>ndcode skill:<\/strong> <a href=\"skills/ndcode/SKILL.md\"><code>skills/ndcode/SKILL.md<\/code><\/a> (headless coding worker, installed into <code>~/.hermes<\/code>).<\/li>\n<li><strong>Licensing:<\/strong> <a href=\"THIRD_PARTY_LICENSES.md\"><code>THIRD_PARTY_LICENSES.md<\/code><\/a> — all-MIT/Apache/PSF, sellable as Neural Deep.<\/li>\n<\/ul>\n<p>Resolution status (open questions Q1–Q10, end-to-end gate) is consolidated in\n<a href=\"docs/reference/verification.md\"><code>docs/reference/verification.md<\/code><\/a>. Signing notarization and\nlive ndcode delegation remain ship-time follow-ups; the dev-run goal is met.<\/p>"}, "THIRD_PARTY_LICENSES.md": ><\/td>\n<td>ndcode runtime<\/td>\n<td>MIT<\/td>\n<td>notice<\/td>\n<\/tr>\n<tr>\n<td>LiteLLM (optional)<\/td>\n<td>alt local proxy<\/td>\n<td>MIT<\/td>\n<td>notice (only if bundled)<\/td>\n<\/tr>\n<tr>\n<td>React, Vite<\/td>\n<td>wrapper frontend<\/td>\n<td>MIT<\/td>\n<td>notice<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"notes-gotchas\">Notes / gotchas<\/h2>\n<ol>\n<li><strong>Trademark ≠ code.<\/strong> MIT licenses the <em>code<\/em>, not names/logos (\"Hermes\", \"Nous\n   Research\", \"opencode\"). Ship under <strong>Neural Deep<\/strong>.<\/li>\n<li><strong>Models ≠ harness.<\/strong> These licenses cover harness <em>code<\/em>. Model weights have their own\n   licenses — out of scope (models are served remotely via the NeuralDeep hub, not bundled).<\/li>\n<li><strong>Official Hermes Desktop binary is NOT ours to rebrand<\/strong> (closed prebuilt, Nous-Portal\n   credit-gated). We build our own from the MIT sources.<\/li>\n<li><strong>Avoid Open WebUI<\/strong> for any reuse — recent versions carry a branding-retention clause\n   (not pure MIT). Our UI is built in-house (<code>app/<\/code>), so this does not apply.<\/li>\n<li><strong>fathah is community-maintained, not affiliated with Nous<\/strong> — fine to lift under MIT;\n   attribute if code is copied.<\/li>\n<\/ol>\n<h2 id=\"full-mit-notice-applies-to-the-mit-components-above\">Full MIT notice (applies to the MIT components above)<\/h2>\n<pre><code>MIT License\n\nCopyright (c) 2025 Nous Research (hermes-agent)\nCopyright (c) the sst/opencode authors (opencode, and ndcode as a fork)\nCopyright (c) the respective authors (fathah/hermes-desktop, Tauri, Bun, React, Vite, LiteLLM)\n\nPermission is hereby granted, free of charge, to any person obtaining a copy\nof this software and associated documentation files (the &quot;Software&quot;), to deal\nin the Software without restriction, including without limitation the rights\nto use, copy, modify, merge, publish, distribute, sublicense, and/or sell\ncopies of the Software, and to permit persons to whom the Software is\nfurnished to do so, subject to the following conditions:\n\nThe above copyright notice and this permission notice shall be included in all\ncopies or substantial portions of the Software.\n\nTHE SOFTWARE IS PROVIDED &quot;AS IS&quot;, WITHOUT WARRANTY OF ANY KIND, EXPRESS OR\nIMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY,\nFITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE\nAUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER\nLIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM,\nOUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE\nSOFTWARE.\n<\/code><\/pre>\n<p>uv is Apache-2.0; python-build-standalone is PSF/permissive — include their full notices in\nthe bundle's NOTICE file when shipping.<\/p>\n<h2 id=\"verdict\">Verdict<\/h2>\n<p><strong>We may sell Neural Deep Desktop under our own brand<\/strong>, provided the notices above ship in\nthe bundle and branding uses only Neural Deep marks. The NeuralDeep hub is ours; reselling\naccess via the app is permitted (record this in the hub ToS).<\/p>"}, "app/README.md": {"rel": "app/README.md", "area": "app", "title": "Neural Deep Desktop — dev app", "size": 2278, "html": "<h1 id=\"neural-deep-desktop-dev-app\">Neural Deep Desktop — dev app<\/h1>\n<p>Thin chat wrapper over the <strong>full Hermes harness<\/strong>, routed through the <strong>NeuralDeep hub<\/strong>.\nEvery model call: <code>App → Hermes (:8642) → api.neuraldeep.ru/v1<\/code>.<\/p>\n<h2 id=\"prerequisites\">Prerequisites<\/h2>\n<ol>\n<li><strong>Hermes backend<\/strong> provisioned at <code>~/.hermes<\/code> and pointed at the hub\n   (<code>~/.hermes/config.yaml<\/code> → <code>model.provider: custom<\/code>, <code>base_url: https://api.neuraldeep.ru/v1<\/code>).<\/li>\n<li><strong><code>API_SERVER_KEY<\/code><\/strong> set in <code>~/.hermes/.env<\/code> (the api_server refuses to start without it).<\/li>\n<li>Start the backend:\n   <code>bash\n   hermes gateway\n   curl http://127.0.0.1:8642/health    # → {\"status\":\"ok\",...}<\/code><\/li>\n<\/ol>\n<h2 id=\"run-native-tauri-desktop-app-recommended\">Run — native Tauri desktop app (recommended)<\/h2>\n<pre><code class=\"language-bash\">cd app\nbun install\nbun run tauri:dev      # builds the Rust host + opens the native &quot;Neural Deep&quot; window\n<\/code><\/pre>\n<p>The Rust host (<code>src-tauri/<\/code>) <strong>spawns &amp; supervises<\/strong> the Hermes gateway (reusing it if it's\nalready healthy on :8642) and <strong>streams chat itself<\/strong> from Hermes into the webview over a\nTauri <code>Channel<\/code>. Because Rust is the trusted loopback client, there is no CORS/Origin gate\nand the API key never reaches the frontend.<\/p>\n<p>Produce a distributable bundle (signed <code>.app<\/code> + <code>.dmg<\/code> on macOS):<\/p>\n<pre><code class=\"language-bash\">bun run tauri:build\n<\/code><\/pre>\n<blockquote>\n<p>Notarization needs the <code>notarytool<\/code> keychain-profile name (open item Q8 in\n<code>../docs/verification.md<\/code>); signing reuses Developer ID <code>Valeriy Kovalsky (A933C2TJXU)<\/code>.<\/p>\n<\/blockquote>\n<h2 id=\"run-browser-dev-no-native-shell\">Run — browser dev (no native shell)<\/h2>\n<pre><code class=\"language-bash\">bun run dev            # Vite dev server on http://127.0.0.1:5173\n<\/code><\/pre>\n<p>In a plain browser tab the app detects it is <strong>not<\/strong> under Tauri and falls back to the Vite\nproxy: <code>/hermes/*<\/code> → <code>http://127.0.0.1:8642/*<\/code>, injecting <code>Authorization: Bearer\n$API_SERVER_KEY<\/code> (from <code>~/.hermes/.env<\/code>) and stripping the browser <code>Origin<\/code> so Hermes' CORS\ngate accepts it. Override the backend with <code>HERMES_URL=...<\/code>.<\/p>\n<h2 id=\"transport-selection\">Transport selection<\/h2>\n<p><code>src/transport.ts<\/code> picks the path automatically: <strong>Tauri → Rust <code>chat_stream<\/code> Channel<\/strong>;\n<strong>browser → fetch SSE through the Vite proxy<\/strong>. Same React UI either way.<\/p>\n<h2 id=\"whats-thin-vs-full\">What's thin vs. full<\/h2>\n<ul>\n<li><strong>Thin (this app):<\/strong> chat input, SSE streaming render, engine/health badge, stop button.<\/li>\n<li><strong>Full (underneath):<\/strong> Hermes memory, skills (incl. the <code>ndcode<\/code> coding-delegation skill),\n  planning, tool use — all reachable, none reimplemented here.<\/li>\n<\/ul>"}, "docs/README.md": {"rel": "docs/README.md", "area": "docs", "title": "Neural Deep Desktop — knowledge base", "size": 1614, "html": "<h1 id=\"neural-deep-desktop-knowledge-base\">Neural Deep Desktop — knowledge base<\/h1>\n<p>Thin Tauri desktop wrapper over the <strong>full Hermes harness<\/strong>, routed through the <strong>NeuralDeep\nhub<\/strong>. Start at <a href=\"./reference/architecture.md\">architecture<\/a>.<\/p>\n<h2 id=\"map\">Map<\/h2>\n<ul>\n<li><strong>Architecture &amp; specs<\/strong> → <a href=\"./reference/README.md\"><code>reference/<\/code><\/a><\/li>\n<li><a href=\"./reference/architecture.md\">architecture<\/a> — target shape, two transports, lifecycle<\/li>\n<li><a href=\"./reference/hermes-backend.md\">hermes-backend<\/a> — <code>:8642<\/code> transport, SSE schema, single proxy<\/li>\n<li><a href=\"./reference/packaging.md\">packaging<\/a> — uv provisioning, signing, notarization<\/li>\n<li><a href=\"./reference/verification.md\">verification<\/a> — Q1–Q10 + end-to-end gate<\/li>\n<li><a href=\"./reference/licensing.md\">licensing<\/a> — MIT/Apache/PSF, sellable as Neural Deep<\/li>\n<li><strong>Components<\/strong> → <a href=\"./services/README.md\"><code>services/<\/code><\/a><\/li>\n<li><a href=\"./services/desktop-app/README.md\">desktop-app<\/a> — Tauri shell (UI + transport + Rust host)<\/li>\n<li><strong>How-to<\/strong> → <a href=\"./guides/README.md\"><code>guides/<\/code><\/a><\/li>\n<li><a href=\"./guides/run-dev.md\">run-dev<\/a><\/li>\n<li><strong>Decisions<\/strong> → <a href=\"./decisions/README.md\"><code>decisions/<\/code><\/a><\/li>\n<li><a href=\"./decisions/0001-rust-host-trusted-loopback.md\">0001 — Rust host is the trusted loopback client<\/a><\/li>\n<li><a href=\"./decisions/0002-thin-wrapper-full-harness.md\">0002 — Thin wrapper, full harness<\/a><\/li>\n<li><strong>Ontology<\/strong> → <a href=\"./ontology.md\">ontology<\/a><\/li>\n<\/ul>\n<h2 id=\"status\">Status<\/h2>\n<p>Resolution of the original research questions (Q1–Q10) and the end-to-end gate is consolidated\nin <a href=\"./reference/verification.md\">verification<\/a>.<\/p>"}, "docs/decisions/0001-rust-host-trusted-loopback.md": {"rel": "docs/decisions/0001-rust-host-trusted-loopback.md", "area": "docs/decisions", "title": "Decision: Rust host is the trusted loopback client", "size": 1342, "html": "<h1 id=\"decision-rust-host-is-the-trusted-loopback-client\">Decision: Rust host is the trusted loopback client<\/h1>\n<h2 id=\"context\">Context<\/h2>\n<p>Hermes' <code>api_server<\/code> (<code>:8642<\/code>) requires <code>API_SERVER_KEY<\/code> and, for <strong>browser<\/strong> callers,\nrejects any request whose <code>Origin<\/code> is not in <code>API_SERVER_CORS_ORIGINS<\/code> (403). A naive webview\ncalling <code>:8642<\/code> directly would 403, and putting the key in the frontend is undesirable.<\/p>\n<h2 id=\"decision\">Decision<\/h2>\n<p>In the Tauri app, <strong>the Rust host makes the HTTP/SSE call<\/strong>, not the webview. A Tauri command\n<code>chat_stream(messages, Channel)<\/code> opens <code>POST /v1/chat/completions<\/code> with the bearer key\n(read from <code>~/.hermes/.env<\/code>) and streams parsed deltas back to the UI over a <code>Channel<\/code>.<\/p>\n<h2 id=\"consequences\">Consequences<\/h2>\n<ul>\n<li>Rust sends <strong>no browser <code>Origin<\/code><\/strong> → Hermes treats it as a non-browser client → no CORS gate.<\/li>\n<li><code>API_SERVER_KEY<\/code> <strong>never enters the webview<\/strong>.<\/li>\n<li>The browser-dev fallback keeps the same property via the Vite proxy (injects key, strips\n  <code>Origin<\/code>) — see <a href=\"../../app/src/transport.ts\">transport.ts<\/a>.<\/li>\n<li>Per-turn abort and richer run events remain available on <code>:8642<\/code> if needed later (Q7).<\/li>\n<\/ul>"}, "docs/decisions/0002-thin-wrapper-full-harness.md": {"rel": "docs/decisions/0002-thin-wrapper-full-harness.md", "area": "docs/decisions", "title": "Decision: thin wrapper, full harness", "size": 1570, "html": "<h1 id=\"decision-thin-wrapper-full-harness\">Decision: thin wrapper, full harness<\/h1>\n<h2 id=\"context\">Context<\/h2>\n<p>The product north star is to ship the <em>complete<\/em> power of Hermes + ndcode behind a very light\ndesktop, not a stripped toy.<\/p>\n<h2 id=\"decision\">Decision<\/h2>\n<ul>\n<li><strong>Hermes is the brain<\/strong>, run headless and unmodified (adopt upstream, MIT). The wrapper\n  spawns it; it does not reimplement the control panel.<\/li>\n<li><strong>ndcode is a tool Hermes pulls in<\/strong> via the <code>ndcode<\/code> skill — not a peer the user toggles.<\/li>\n<li><strong>One proxy:<\/strong> both Hermes (<code>config.yaml<\/code> custom provider) and ndcode (<code>NEURALDEEP_*<\/code> env)\n  point at the same NeuralDeep hub base URL + key.<\/li>\n<li><strong>The wrapper is thin:<\/strong> Tauri shell = streaming chat + minimal settings + backend\n  lifecycle. The weight lives in the (provisioned) harness, not the installer.<\/li>\n<li><strong>Dev shortcut:<\/strong> reuse the already-installed <code>~/.hermes<\/code> instead of first-run provisioning;\n  the <code>uv<\/code> + standalone-CPython path (see <a href=\"../reference/packaging.md\">packaging<\/a>) is the\n  ship-time story.<\/li>\n<\/ul>\n<h2 id=\"consequences\">Consequences<\/h2>\n<ul>\n<li>Minimal installer; full agent capability (memory, skills, planning, tool use).<\/li>\n<li>Transport fragility is isolated behind one adapter\n  (<a href=\"../../app/src/transport.ts\">transport.ts<\/a> / the Rust host); Hermes version is pinned.<\/li>\n<li>Whole stack is MIT/Apache/PSF → sellable as Neural Deep (see\n  <a href=\"../reference/licensing.md\">licensing<\/a>).<\/li>\n<\/ul>"}, "docs/decisions/README.md": {"rel": "docs/decisions/README.md", "area": "docs/decisions", "title": "Decisions", "size": 303, "html": "<h1 id=\"decisions\">Decisions<\/h1>\n<ul>\n<li><a href=\"./0001-rust-host-trusted-loopback.md\">0001 — Rust host is the trusted loopback client<\/a><\/li>\n<li><a href=\"./0002-thin-wrapper-full-harness.md\">0002 — Thin wrapper, full harness<\/a><\/li>\n<\/ul>"}, "docs/guides/README.md": {"rel": "docs/guides/README.md", "area": "docs/guides", "title": "Guides", "size": 220, "html": "<h1 id=\"guides\">Guides<\/h1>\n<ul>\n<li><a href=\"./run-dev.md\">run-dev<\/a> — run the app (native Tauri or browser), verify, build a distributable<\/li>\n<\/ul>"}, "docs/guides/run-dev.md": {"rel": "docs/guides/run-dev.md", "area": "docs/guides", "title": "Run the app in dev", "size": 1739, "html": "<h1 id=\"run-the-app-in-dev\">Run the app in dev<\/h1>\n<h2 id=\"prerequisites\">Prerequisites<\/h2>\n<ol>\n<li>Hermes provisioned at <code>~/.hermes<\/code>, pointed at the hub (<code>~/.hermes/config.yaml<\/code> →\n   <code>model.provider: custom<\/code>, <code>base_url: https://api.neuraldeep.ru/v1<\/code>).<\/li>\n<li><code>API_SERVER_KEY<\/code> set in <code>~/.hermes/.env<\/code> (the api_server refuses to start without it).<\/li>\n<li>Toolchain: <code>bun<\/code>, Rust (<code>cargo<\/code>), Xcode CLT (macOS).<\/li>\n<\/ol>\n<p>The Rust host starts Hermes automatically; you can also start it manually:<\/p>\n<pre><code class=\"language-bash\">hermes gateway\ncurl http://127.0.0.1:8642/health     # → {&quot;status&quot;:&quot;ok&quot;,...}\n<\/code><\/pre>\n<h2 id=\"native-tauri-app-recommended\">Native Tauri app (recommended)<\/h2>\n<pre><code class=\"language-bash\">cd app &amp;&amp; bun install\nbun run tauri:dev          # builds the Rust host, opens the native &quot;Neural Deep&quot; window\n<\/code><\/pre>\n<p>The Rust host spawns/supervises Hermes (reuses a healthy <code>:8642<\/code>) and streams chat over a\n<code>Channel<\/code>. No CORS/Origin gate; the API key stays in Rust.<\/p>\n<h2 id=\"browser-dev-no-native-shell\">Browser dev (no native shell)<\/h2>\n<pre><code class=\"language-bash\">cd app &amp;&amp; bun run dev      # Vite on http://127.0.0.1:5173\n<\/code><\/pre>\n<p>Falls back to the Vite <code>/hermes<\/code> proxy (injects the key, strips <code>Origin<\/code>). Override the\nbackend with <code>HERMES_URL=...<\/code>.<\/p>\n<h2 id=\"verify\">Verify<\/h2>\n<p>Open the app, confirm the engine badge reads <strong>\"Hermes vX online → NeuralDeep hub\"<\/strong>, click\n<strong>Test the free tier<\/strong> → expect a streamed <code>NEURALDEEP_FREE_TIER_OK<\/code>.<\/p>\n<h2 id=\"build-a-distributable\">Build a distributable<\/h2>\n<pre><code class=\"language-bash\">bun run tauri:build        # signed .app + .dmg (macOS)\n<\/code><\/pre>\n<p>Notarization needs the notarytool profile — see <a href=\"../reference/packaging.md\">packaging<\/a> and\nopen question Q8 in <a href=\"../reference/verification.md\">verification<\/a>.<\/p>"}, "docs/ontology.md": {"rel": "docs/ontology.md", "area": "docs", "title": "KB ontology (OntoShip) — this repo", "size": 1167, "html": "<h1 id=\"kb-ontology-ontoship-this-repo\">KB ontology (OntoShip) — this repo<\/h1>\n<p>md + git is the source of truth; the index/graph are derived. Every doc under <code>docs/<\/code> has a\n<code>node_type<\/code>, frontmatter properties, and ≥1 typed link.<\/p>\n<h2 id=\"node_type-vocabulary\">node_type vocabulary<\/h2>\n<p><code>service · reference · runbook · gotcha · decision · plan · guide · report · index<\/code><\/p>\n<h2 id=\"status-vocabulary\">status vocabulary<\/h2>\n<p><code>active · draft · deprecated · archived<\/code><\/p>\n<h2 id=\"service-vocabulary-this-repo\">service vocabulary (this repo)<\/h2>\n<table>\n<thead>\n<tr>\n<th>service<\/th>\n<th>meaning<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><code>desktop-app<\/code><\/td>\n<td>the Tauri shell — React UI, transport, Rust host (<code>app/<\/code>)<\/td>\n<\/tr>\n<tr>\n<td><code>backend<\/code><\/td>\n<td>Hermes harness + its OpenAI-compatible API on <code>:8642<\/code> (<code>~/.hermes<\/code>)<\/td>\n<\/tr>\n<tr>\n<td><code>build<\/code><\/td>\n<td>packaging, signing, licensing<\/td>\n<\/tr>\n<tr>\n<td><code>meta<\/code><\/td>\n<td>KB about the KB<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"link-types\">link types<\/h2>\n<p><code>documents<\/code> / <code>implemented_by<\/code> (doc ↔ code) · <code>depends_on<\/code> / <code>relates_to<\/code> (doc ↔ doc) ·\n<code>supersedes<\/code> (replacement ↔ deprecated).<\/p>\n<h2 id=\"folders\">folders<\/h2>\n<p><code>docs/reference/<\/code> specs · <code>docs/services/&lt;svc&gt;/<\/code> per-component · <code>docs/guides/<\/code> how-to ·\n<code>docs/decisions/<\/code> ADRs · each folder carries a <code>README.md<\/code> index.<\/p>"}, "docs/reference/README.md": {"rel": "docs/reference/README.md", "area": "docs/reference", "title": "Reference", "size": 592, "html": "<h1 id=\"reference\">Reference<\/h1>\n<ul>\n<li><a href=\"./architecture.md\">architecture<\/a> — target architecture, two transports, process lifecycle<\/li>\n<li><a href=\"./hermes-backend.md\">hermes-backend<\/a> — <code>:8642<\/code> transport, SSE schema, single proxy, auth<\/li>\n<li><a href=\"./packaging.md\">packaging<\/a> — uv + standalone CPython provisioning, signing &amp; notarization<\/li>\n<li><a href=\"./verification.md\">verification<\/a> — open questions Q1–Q10 + end-to-end verification gate<\/li>\n<li><a href=\"./licensing.md\">licensing<\/a> — license inventory; sellable under Neural Deep<\/li>\n<\/ul>"}, "docs/reference/architecture.md": {"rel": "docs/reference/architecture.md", "area": "docs/reference", "title": "Target architecture", "size": 4767, "html": "<h1 id=\"target-architecture\">Target architecture<\/h1>\n<p><strong>Full harness, thin wrapper.<\/strong> A native Tauri desktop shell gives a clean streaming chat;\nthe heavy power lives in the (already-provisioned) Hermes harness, which both Hermes and its\n<code>ndcode<\/code> coding worker route through <strong>one<\/strong> proxy — the NeuralDeep hub.<\/p>\n<pre><code>┌─ Neural Deep.app  (Tauri v2 — native window) ───────────────────────────┐\n│  WebView: React 19 chat  (app/src/App.tsx)                              │\n│     │  app/src/transport.ts  →  isTauri ?                               │\n│     │      ├─ Tauri:   invoke(&quot;chat_stream&quot;, Channel)  ── native path   │\n│     │      └─ browser: fetch SSE via Vite /hermes proxy ── dev path     │\n│     ▼                                                                    │\n│  Rust host  (app/src-tauri/src/lib.rs)                                  │\n│   • setup(): ensure_backend() — health-check :8642, spawn `hermes       │\n│     gateway` if down (else reuse); kill on window Destroyed             │\n│   • read_api_key() ← ~/.hermes/.env   (key never reaches the frontend)  │\n│   • chat_stream(): reqwest POST /v1/chat/completions stream:true →      │\n│     parse SSE → Channel.send(Delta|Done|Error)                         │\n│      │  HTTP + SSE (loopback; Rust sends no Origin → CORS gate N/A)     │\n│      ▼                                                                   │\n│  FULL HARNESS: Hermes Agent v0.14.0 (~/.hermes, headless gateway)       │\n│    api_server platform → OpenAI-compatible API on 127.0.0.1:8642        │\n│        └─ skill &quot;ndcode&quot; ──spawns──▶ ndcode run '&lt;task&gt;'  (coding)      │\n│  model.provider=custom · base_url + api_key  →                         │\n└──────┼───────────────────────────────────────────────────────────────-─┘\n       ▼\n   NeuralDeep hub — https://api.neuraldeep.ru/v1  (free tier: qwen3.6-35b-a3b, gpt-oss-120b…)\n<\/code><\/pre>\n<h2 id=\"components\">Components<\/h2>\n<table>\n<thead>\n<tr>\n<th>Layer<\/th>\n<th>Where<\/th>\n<th>Role<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Chat UI<\/td>\n<td><code>app/src/App.tsx<\/code>, <code>styles.css<\/code><\/td>\n<td>thin streaming chat: engine badge, deltas, stop<\/td>\n<\/tr>\n<tr>\n<td>Transport<\/td>\n<td><code>app/src/transport.ts<\/code><\/td>\n<td>auto-selects Tauri Channel vs browser fetch-SSE<\/td>\n<\/tr>\n<tr>\n<td>Rust host<\/td>\n<td><code>app/src-tauri/src/lib.rs<\/code><\/td>\n<td>spawns/supervises Hermes; streams chat; holds the key<\/td>\n<\/tr>\n<tr>\n<td>Backend<\/td>\n<td><code>~/.hermes<\/code> (Hermes v0.14.0)<\/td>\n<td>full harness; OpenAI-compatible API on <code>:8642<\/code><\/td>\n<\/tr>\n<tr>\n<td>Coding worker<\/td>\n<td>ndcode (<code>~/NeuralDeepCode<\/code>)<\/td>\n<td>headless <code>run<\/code>/<code>serve<\/code>, pulled in via the <code>ndcode<\/code> skill<\/td>\n<\/tr>\n<tr>\n<td>Proxy<\/td>\n<td>NeuralDeep hub (external)<\/td>\n<td>single OpenAI-compatible gateway for both harnesses<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"two-transports-one-ui\">Two transports, one UI<\/h2>\n<ul>\n<li><strong>Native (Tauri):<\/strong> <code>isTauri === true<\/code> → <code>invoke(\"chat_stream\", {messages, onEvent})<\/code> with a\n  <code>Channel<\/code>. Rust is the trusted loopback client — no browser <code>Origin<\/code>, so Hermes' CORS gate\n  is a non-issue, and <code>API_SERVER_KEY<\/code> never enters the webview.<\/li>\n<li><strong>Browser dev:<\/strong> <code>isTauri === false<\/code> → fetch SSE through the Vite proxy <code>/hermes/*<\/code> →\n  <code>:8642<\/code>, which injects <code>Authorization<\/code> and strips <code>Origin<\/code>. Same React UI.<\/li>\n<\/ul>\n<p>Both transports drive Hermes' <strong>session chat stream<\/strong>\n(<code>POST /api/sessions/{id}/chat/stream<\/code>), whose named SSE events carry not just content but\n<strong>reasoning<\/strong> (<code>tool.progress<\/code>/<code>_thinking<\/code>) and <strong>tool steps<\/strong> — rendered as a collapsible\nreasoning panel and tool chips. The app also surfaces the agent <strong>working dir<\/strong> (<code>agent_info<\/code>)\nand the hub <strong>tariff<\/strong> (<code>subscription<\/code> → <code>hub.neuraldeep.ru/api/cli/status<\/code>).<\/p>\n<p>See <a href=\"./hermes-backend.md\">hermes-backend<\/a> for the wire-level transport + SSE schema and\n<a href=\"./verification.md\">verification<\/a> for the live end-to-end proof.<\/p>\n<h2 id=\"process-lifecycle\">Process lifecycle<\/h2>\n<pre><code>Tauri Rust host (app process)\n  ├─ ensure_backend(): reuse healthy :8642, else spawn `hermes gateway`   [lib.rs]\n  │     └─ Hermes, via skill &quot;ndcode&quot;, spawns: ndcode run '&lt;task&gt;'        [skills/ndcode]\n  │            └─ ndcode → NeuralDeep hub\n  └─ Hermes → NeuralDeep hub\nWebView ⇄ Rust host ⇄ Hermes API  (invoke + Channel; loopback HTTP/SSE)\n<\/code><\/pre>"}, "docs/reference/hermes-backend.md": {"rel": "docs/reference/hermes-backend.md", "area": "docs/reference", "title": "Hermes backend notes — transport, provisioning, single proxy", "size": 7393, "html": "<h1 id=\"hermes-backend-notes-transport-provisioning-single-proxy\">Hermes backend notes — transport, provisioning, single proxy<\/h1>\n<blockquote>\n<p>Distilled spec of record for tasks 02/04/05/08. Traceable to the local install at\n<code>~/.hermes<\/code> and source at <code>~/.hermes/hermes-agent<\/code> (Hermes Agent v0.14.0, MIT).<\/p>\n<\/blockquote>\n<h2 id=\"1-what-we-run-task_02\">1. What we run (task_02)<\/h2>\n<p>Hermes is already provisioned locally (git install method) at <code>~/.hermes<\/code>, with the\nfull source at <code>~/.hermes/hermes-agent<\/code> and a Python 3.11 venv at\n<code>~/.hermes/hermes-agent/venv<\/code>. Launcher: <code>~/.local/bin/hermes<\/code>.<\/p>\n<p><strong>Headless, account-less, local backend<\/strong> — start command:<\/p>\n<pre><code class=\"language-bash\">hermes gateway        # runs the messaging gateway; brings up the api_server platform\n<\/code><\/pre>\n<p>The chat transport is the <strong>api_server gateway platform<\/strong>\n(<code>gateway/platforms/api_server.py<\/code>), enabled in <code>~/.hermes/config.yaml<\/code>:<\/p>\n<pre><code class=\"language-yaml\">platforms:\n  api_server:\n    enabled: true\n    extra: { port: 8642, host: 127.0.0.1 }\n<\/code><\/pre>\n<p>Health check: <code>GET http://127.0.0.1:8642/health<\/code> → <code>{\"status\":\"ok\",\"version\":\"0.14.0\"}<\/code>.<\/p>\n<p>No Nous Portal account is required (Q2 = <strong>resolved: yes, fully local<\/strong>). Models come\nfrom a custom OpenAI-compatible provider (the NeuralDeep hub), configured in\n<code>config.yaml<\/code> (see §3). No <code>hermes login<\/code> / portal credit tier is involved.<\/p>\n<h2 id=\"2-chat-transport-task_04-q1-q6\">2. Chat transport (task_04 / Q1 / Q6)<\/h2>\n<p><code>api_server.py<\/code> is itself an <strong>OpenAI-compatible server<\/strong> at <code>http://127.0.0.1:8642/v1<\/code>.\nThis is a first-class, documented server mode designed for external UIs (Open WebUI,\nLobeChat, LibreChat…), <strong>not<\/strong> an internals-coupled hack → <strong>Q6 = stable<\/strong>.<\/p>\n<p>Endpoints we use:<\/p>\n<table>\n<thead>\n<tr>\n<th>Method<\/th>\n<th>Route<\/th>\n<th>Purpose<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><code>GET<\/code><\/td>\n<td><code>/health<\/code><\/td>\n<td>liveness<\/td>\n<\/tr>\n<tr>\n<td><code>GET<\/code><\/td>\n<td><code>/v1/models<\/code><\/td>\n<td>lists <code>hermes-agent<\/code> as the model<\/td>\n<\/tr>\n<tr>\n<td><code>POST<\/code><\/td>\n<td><code>/v1/chat/completions<\/code><\/td>\n<td>OpenAI Chat Completions, <code>stream:true<\/code> → SSE<\/td>\n<\/tr>\n<tr>\n<td><code>GET<\/code><\/td>\n<td><code>/v1/capabilities<\/code><\/td>\n<td>machine-readable capabilities<\/td>\n<\/tr>\n<tr>\n<td><code>POST<\/code><\/td>\n<td><code>/api/sessions<\/code><\/td>\n<td>create a session → <code>{session:{id}}<\/code><\/td>\n<\/tr>\n<tr>\n<td><code>POST<\/code><\/td>\n<td><code>/api/sessions/{id}/chat/stream<\/code><\/td>\n<td><strong>stateful chat with reasoning + tool steps<\/strong> (named SSE — what the app uses)<\/td>\n<\/tr>\n<tr>\n<td>session/run routes<\/td>\n<td><code>/api/sessions*<\/code>, <code>/v1/runs*<\/code><\/td>\n<td>SSE run events, <strong>per-turn abort<\/strong> via <code>POST /v1/runs/{id}/stop<\/code> (Q7 = yes)<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3 id=\"reasoning-tool-steps-named-sse\">Reasoning &amp; tool steps (named SSE)<\/h3>\n<p><code>/v1/chat/completions<\/code> <strong>strips reasoning<\/strong> (<code>_thinking<\/code> and tool progress are intentionally\nnot forwarded). To show reasoning, the app drives <code>POST /api/sessions/{id}/chat/stream<\/code>, which\nemits <strong>named<\/strong> events (<code>event: &lt;name&gt;\\ndata: &lt;json&gt;<\/code>):<\/p>\n<table>\n<thead>\n<tr>\n<th>event<\/th>\n<th>meaning<\/th>\n<th>UI<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><code>assistant.delta<\/code><\/td>\n<td>content token (<code>{delta}<\/code>)<\/td>\n<td>main bubble<\/td>\n<\/tr>\n<tr>\n<td><code>reasoning.delta<\/code><\/td>\n<td><strong>model chain-of-thought<\/strong> (<code>{delta}<\/code>) — requires the patch below<\/td>\n<td>collapsible reasoning panel<\/td>\n<\/tr>\n<tr>\n<td><code>tool.progress<\/code> (<code>tool_name==\"_thinking\"<\/code>)<\/td>\n<td>intermediate agent-turn reasoning (<code>{delta}<\/code>)<\/td>\n<td>reasoning panel<\/td>\n<\/tr>\n<tr>\n<td><code>tool.started/completed/failed<\/code><\/td>\n<td>tool step<\/td>\n<td>tool chips<\/td>\n<\/tr>\n<tr>\n<td><code>assistant.completed<\/code><\/td>\n<td>final content (fallback if no deltas streamed)<\/td>\n<td>main bubble<\/td>\n<\/tr>\n<tr>\n<td><code>run.completed<\/code><\/td>\n<td><code>{usage}<\/code><\/td>\n<td>token readout<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<blockquote>\n<p><strong>Reasoning patch.<\/strong> Out of the box Hermes drops the model's reasoning from the session\nstream (it wires <code>stream_delta_callback<\/code>/<code>tool_progress_callback<\/code> but not\n<code>reasoning_callback<\/code>). <code>patches/hermes-api_server-reasoning.patch<\/code> threads a\n<code>reasoning_callback<\/code> through <code>_create_agent<\/code>/<code>_run_agent<\/code> and emits <code>reasoning.delta<\/code>.\nSee <a href=\"../../patches/README.md\"><code>patches/README.md<\/code><\/a>. Re-apply after a Hermes upgrade.<\/p>\n<\/blockquote>\n<h3 id=\"subscription-tariff\">Subscription / tariff<\/h3>\n<p><code>GET https://hub.neuraldeep.ru/api/cli/status<\/code> (bearer = hub key) returns\n<code>{tier, user:{name,email}, limits:{rpm,parallel}, models:[{id,mode,ctx}]}<\/code> — surfaced as the\ndesktop's Plan badge (e.g. <strong>Pro · kekslops · 8 models<\/strong>). The Rust host calls it directly\nwith the hub key (never exposed to the webview). (The older LiteLLM <code>/key/info<\/code> on\n<code>api.neuraldeep.ru<\/code> exposed spend/budget but no tier — superseded by <code>cli/status<\/code>.)<\/p>\n<h3 id=\"sse-schema-verified-live\">SSE schema (verified live)<\/h3>\n<p><code>POST /v1/chat/completions<\/code> with <code>stream:true<\/code> emits standard OpenAI chunks:<\/p>\n<pre><code>data: {&quot;choices&quot;:[{&quot;delta&quot;:{&quot;role&quot;:&quot;assistant&quot;}}]}\ndata: {&quot;choices&quot;:[{&quot;delta&quot;:{&quot;content&quot;:&quot;NE&quot;}}]}\ndata: {&quot;choices&quot;:[{&quot;delta&quot;:{&quot;content&quot;:&quot;URAL&quot;}}]}\n...\ndata: {&quot;choices&quot;:[{&quot;delta&quot;:{},&quot;finish_reason&quot;:&quot;stop&quot;}],&quot;usage&quot;:{&quot;prompt_tokens&quot;:15273,&quot;completion_tokens&quot;:24,&quot;total_tokens&quot;:15297}}\ndata: [DONE]\n<\/code><\/pre>\n<p>The ~15k prompt tokens confirm the <strong>full harness<\/strong> (skills + memory + tools) is engaged,\nnot a thin passthrough.<\/p>\n<h3 id=\"auth-task_02-t25\">Auth (task_02 T2.5)<\/h3>\n<p><code>api_server<\/code> <strong>requires<\/strong> <code>API_SERVER_KEY<\/code> even on loopback (it refuses to start without\none — <code>api_server.py:4225<\/code>). We set it in <code>~/.hermes/.env<\/code>:<\/p>\n<pre><code>API_SERVER_KEY=nd-&lt;random hex&gt;\n<\/code><\/pre>\n<p>Clients send <code>Authorization: Bearer $API_SERVER_KEY<\/code>.<\/p>\n<p><strong>CORS / Origin gate:<\/strong> browser requests carry an <code>Origin<\/code> header; <code>_origin_allowed()<\/code>\nreturns 403 unless the origin is in <code>API_SERVER_CORS_ORIGINS<\/code> (<code>api_server.py:558,831<\/code>).\nFor the desktop dev proxy we <strong>strip the <code>Origin<\/code> header<\/strong> at the loopback proxy so Hermes\ntreats it as a non-browser caller (the proxy is the trusted client). Production Tauri uses a\ncustom-scheme webview / Rust host, same effect. (Alternative: set\n<code>API_SERVER_CORS_ORIGINS=http://127.0.0.1:5173<\/code>.)<\/p>\n<h2 id=\"3-single-proxy-both-harnesses-neuraldeep-hub-task_05-q5\">3. Single proxy: both harnesses → NeuralDeep hub (task_05 / Q5)<\/h2>\n<p><strong>Hub:<\/strong> <code>https://api.neuraldeep.ru/v1<\/code>, key <code>sk-x9...<\/code> (free tier). One <code>curl<\/code>:<\/p>\n<pre><code class=\"language-bash\">curl -s https://api.neuraldeep.ru/v1/chat/completions \\\n  -H &quot;Authorization: Bearer $NEURALDEEP_API_KEY&quot; -H &quot;Content-Type: application/json&quot; \\\n  -d '{&quot;model&quot;:&quot;qwen3.6-35b-a3b-noreason&quot;,&quot;messages&quot;:[{&quot;role&quot;:&quot;user&quot;,&quot;content&quot;:&quot;hi&quot;}]}'\n<\/code><\/pre>\n<p>Free-tier models observed: <code>gpt-oss-120b<\/code>, <code>qwen3.6-35b-a3b<\/code>(+<code>-noreason<\/code>),\n<code>kimi-k2.6<\/code>, <code>gemma-4-31b<\/code>, <code>glm-5.2<\/code>, <code>deepseek-v4-pro<\/code>, embeddings/rerankers, <code>whisper-1<\/code>.<\/p>\n<p><strong>Hermes wiring<\/strong> (<code>~/.hermes/config.yaml<\/code>) — the exact config keys (Q5):<\/p>\n<pre><code class=\"language-yaml\">model:\n  default: qwen3.6-35b-a3b\n  provider: custom\n  base_url: https://api.neuraldeep.ru/v1\n  api_key: sk-x9...\n<\/code><\/pre>\n<p><strong>ndcode wiring<\/strong> — env (non-interactive, no <code>/login<\/code>, Q4):<\/p>\n<pre><code>NEURALDEEP_API_KEY=sk-x9...\nNEURALDEEP_API_BASE=https://api.neuraldeep.ru/v1\n<\/code><\/pre>\n<p>Both harnesses hit the <strong>same base URL + key<\/strong> → one proxy, two clients (task_05 ✓).<\/p>\n<h2 id=\"4-end-to-end-integration-task_08\">4. End-to-end integration (task_08)<\/h2>\n<pre><code>App (Vite dev :5173)  ──/hermes proxy (injects key, strips Origin)──▶  Hermes :8642\n        ▲                                                                   │\n        └────────────────── SSE token stream ◀──────────────────────────────┤\n                                                                            ▼\n                                              NeuralDeep hub (api.neuraldeep.ru/v1)\n                                                   └─ Hermes, via skill &quot;ndcode&quot;,\n                                                      spawns `ndcode run '&lt;task&gt;'` ─▶ hub\n<\/code><\/pre>\n<p>Verified live through the running dev UI: prompt → Hermes agent loop → neuraldeep free\ntier → streamed back, rendered as <code>NEURALDEEP_FREE_TIER_OK<\/code>\n(see <code>../../neuraldeep-desktop-devrun.png<\/code>).<\/p>"}, "docs/reference/licensing.md": {"rel": "docs/reference/licensing.md", "area": "docs/reference", "title": "Licensing & commercialization", "size": 1122, "html": "<h1 id=\"licensing-commercialization\">Licensing &amp; commercialization<\/h1>\n<p>The full component chain is permissive (<strong>MIT / Apache-2.0 / PSF<\/strong>) → <strong>sellable under the\nNeural Deep brand<\/strong>. The authoritative notice file is\n<a href=\"../../THIRD_PARTY_LICENSES.md\"><code>THIRD_PARTY_LICENSES.md<\/code><\/a> (ship it in the bundle).<\/p>\n<table>\n<thead>\n<tr>\n<th>Component<\/th>\n<th>License<\/th>\n<th>Sell/rebrand?<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Hermes Agent<\/td>\n<td>MIT © 2025 Nous Research<\/td>\n<td>✅ keep notice<\/td>\n<\/tr>\n<tr>\n<td>ndcode (fork of opencode)<\/td>\n<td>MIT<\/td>\n<td>✅ keep upstream notice<\/td>\n<\/tr>\n<tr>\n<td>fathah/hermes-desktop (patterns)<\/td>\n<td>MIT<\/td>\n<td>✅ notice if copied<\/td>\n<\/tr>\n<tr>\n<td>uv / python-build-standalone<\/td>\n<td>Apache-2.0 / PSF<\/td>\n<td>✅ notice<\/td>\n<\/tr>\n<tr>\n<td>Tauri / Bun / React / Vite<\/td>\n<td>MIT (Tauri MIT/Apache)<\/td>\n<td>✅ notice<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p><strong>Conditions:<\/strong> trademark ≠ code (ship as Neural Deep, not \"Hermes\"); preserve notices;\nmodel weights are out of scope (served via the hub, not bundled); avoid Open WebUI\n(branding-retention clause). See task_10 for the full pass.<\/p>"}, "docs/reference/packaging.md": {"rel": "docs/reference/packaging.md", "area": "docs/reference", "title": "Packaging, provisioning & signing notes (tasks 06 + 09)", "size": 3475, "html": "<h1 id=\"packaging-provisioning-signing-notes-tasks-06-09\">Packaging, provisioning &amp; signing notes (tasks 06 + 09)<\/h1>\n<blockquote>\n<p>For the dev-run goal the backend is <strong>reused in place<\/strong> (<code>~/.hermes<\/code>). This file records\nthe ship-path: how a clean machine would provision the same stack, plus signing.<\/p>\n<\/blockquote>\n<h2 id=\"backend-provisioning-task_06-hybrid-ab-via-uv\">Backend provisioning (task_06) — hybrid A+B via <code>uv<\/code><\/h2>\n<p>The only hard-to-package piece is the Python Hermes harness. Decision: bundle small native\nbits, provision Python on first run.<\/p>\n<p><strong>Bundle (small):<\/strong> Tauri shell + native <code>ndcode<\/code> binary (<code>bin/ndcode-&lt;triple&gt;<\/code>) + a tiny\n<code>uv<\/code> binary (<code>bin/uv-&lt;triple&gt;<\/code>) as Tauri <code>externalBin<\/code>. No Python interpreter in the installer.<\/p>\n<p><strong>First run (provision)<\/strong> into app-data\n(<code>~/Library/Application Support/NeuralDeep<\/code> on macOS, <code>%APPDATA%\\NeuralDeep<\/code> on Windows):<\/p>\n<pre><code class=\"language-bash\">uv python install 3.11            # pinned standalone CPython (python-build-standalone)\nuv pip install hermes-agent…      # full Hermes into the app-data venv\n<\/code><\/pre>\n<p>Idempotent; progress surfaced to the UI; offline-detect + retry. (Optional later: pre-seed\nCPython + wheels into Resources for a fully offline first run = pure strategy A.)<\/p>\n<p><strong>Run / lifecycle (T6.5):<\/strong> Rust host spawns <code>hermes gateway<\/code> headless, health-checks\n<code>GET :8642/health<\/code>, restarts on crash, clean shutdown on quit. <code>ndcode<\/code> must be on the\nHermes process <code>PATH<\/code> (Hermes spawns it as a grandchild via the <code>ndcode<\/code> skill).<\/p>\n<p><strong>ndcode build (T6.4 / Q10):<\/strong> <code>bun build --compile<\/code> → one self-contained native binary\nper target (ndcode is a Bun app; upstream opencode ships exactly this way). The local repo\n<code>~/NeuralDeepCode<\/code> retains <code>RunCommand<\/code>/<code>ServeCommand<\/code> so the compiled binary is headless-capable.<\/p>\n<p><strong>Version manifest (T6.6)<\/strong> for reproducible builds:<\/p>\n<table>\n<thead>\n<tr>\n<th>Component<\/th>\n<th>Pin (this machine)<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Hermes Agent<\/td>\n<td>v0.14.0 (git)<\/td>\n<\/tr>\n<tr>\n<td>ndcode<\/td>\n<td>local <code>~/NeuralDeepCode<\/code> (fork of sst/opencode)<\/td>\n<\/tr>\n<tr>\n<td>CPython<\/td>\n<td>3.11.10 (venv) / 3.11 pinned for <code>uv<\/code><\/td>\n<\/tr>\n<tr>\n<td>uv<\/td>\n<td>0.6.1<\/td>\n<\/tr>\n<tr>\n<td>Bun<\/td>\n<td>1.3.14<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3 id=\"dev-shortcut-what-we-actually-used\">Dev shortcut (what we actually used)<\/h3>\n<p>Backend already provisioned at <code>~/.hermes<\/code> → we skip first-run and just\n<code>hermes gateway<\/code>. <code>ndcode<\/code> resolved via a dev wrapper <code>~/.local/bin/ndcode<\/code> that execs\n<code>bun run --cwd ~/NeuralDeepCode/packages/ndcode src/index.ts<\/code>.<\/p>\n<h2 id=\"signing-notarization-task_09-deferred-not-needed-for-dev-run\">Signing &amp; notarization (task_09) — deferred (not needed for dev run)<\/h2>\n<p>Reuse the NeuralDeskApp macOS runbook:<\/p>\n<ul>\n<li><strong>Developer ID Application:<\/strong> <code>Valeriy Kovalsky (A933C2TJXU)<\/code> (in keychain).<\/li>\n<li>Sign with hardened runtime (<code>--options runtime<\/code>) + timestamp; entitlements <code>allow-jit<\/code>,\n  <code>allow-unsigned-executable-memory<\/code>, <code>disable-library-validation<\/code>.<\/li>\n<li>Sign <strong>every<\/strong> nested binary: app, host, <code>ndcode<\/code>, <code>uv<\/code>, bundled python.<\/li>\n<li>Notarize <code>.app<\/code> + <code>.dmg<\/code>: <code>ditto -c -k --keepParent<\/code> → <code>xcrun notarytool submit --wait<\/code>\n  → <code>xcrun stapler staple<\/code>; DMG must be UDIF (<code>hdiutil convert -format UDZO<\/code>).<\/li>\n<li>Verify <code>spctl -a -vvv -t exec App.app<\/code> → \"Notarized Developer ID\".<\/li>\n<\/ul>\n<p><strong>Open blockers (→ task_11):<\/strong>\n- <strong>Q8<\/strong> macOS <code>notarytool<\/code> keychain-profile name — needs user input.\n- <strong>Q9<\/strong> Windows Authenticode (EV) cert — procurement.<\/p>\n<p>First-run provisioning writes to user-writable app-data (outside the signed <code>.app<\/code>), so it\ndoes not break the signature / Gatekeeper.<\/p>"}, "docs/reference/verification.md": {"rel": "docs/reference/verification.md", "area": "docs/reference", "title": "Verification & open questions (task_11)", "size": 4226, "html": "<h1 id=\"verification-open-questions-task_11\">Verification &amp; open questions (task_11)<\/h1>\n<h2 id=\"open-questions-closed\">Open questions — closed<\/h2>\n<table>\n<thead>\n<tr>\n<th>#<\/th>\n<th>Question<\/th>\n<th>Answer (this build)<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Q1<\/td>\n<td>Hermes chat route + streaming schema<\/td>\n<td><strong><code>POST :8642/v1/chat/completions<\/code>, <code>stream:true<\/code> → OpenAI SSE chunks<\/strong> (<code>delta.content<\/code>), <code>[DONE]<\/code> terminator. <code>:8642<\/code> is the api_server gateway platform.<\/td>\n<\/tr>\n<tr>\n<td>Q2<\/td>\n<td>Fully local, no Nous account?<\/td>\n<td><strong>Yes.<\/strong> <code>model.provider: custom<\/code> + <code>base_url<\/code> (NeuralDeep hub) in <code>~/.hermes/config.yaml<\/code>; no portal login, no credit tier.<\/td>\n<\/tr>\n<tr>\n<td>Q3<\/td>\n<td>ndcode keeps opencode headless <code>run<\/code>/<code>serve<\/code>?<\/td>\n<td><strong>Yes.<\/strong> <code>~/NeuralDeepCode/packages/ndcode/src/index.ts<\/code> registers <code>RunCommand<\/code> (<code>run [message..]<\/code>) and <code>ServeCommand<\/code> (<code>serve<\/code>).<\/td>\n<\/tr>\n<tr>\n<td>Q4<\/td>\n<td>Non-interactive hub auth for ndcode?<\/td>\n<td><strong>Yes.<\/strong> <code>NEURALDEEP_API_KEY<\/code> + <code>NEURALDEEP_API_BASE<\/code> env, skip browser <code>/login<\/code>.<\/td>\n<\/tr>\n<tr>\n<td>Q5<\/td>\n<td>Hermes config keys for custom OpenAI provider<\/td>\n<td><code>model: {provider: custom, base_url, api_key, default}<\/code>. Verified live.<\/td>\n<\/tr>\n<tr>\n<td>Q6<\/td>\n<td><code>:8642<\/code> stable server mode or internals-coupled?<\/td>\n<td><strong>Stable.<\/strong> api_server is a first-class OpenAI-compatible adapter built for external UIs.<\/td>\n<\/tr>\n<tr>\n<td>Q7<\/td>\n<td>Per-turn abort over local API?<\/td>\n<td><strong>Yes<\/strong> — <code>POST /v1/runs/{run_id}/stop<\/code>; the UI \"Stop\" also aborts the fetch stream.<\/td>\n<\/tr>\n<tr>\n<td>Q8<\/td>\n<td>macOS notarytool profile name<\/td>\n<td><strong>Open<\/strong> — needs user input (only blocks notarization, not dev run).<\/td>\n<\/tr>\n<tr>\n<td>Q9<\/td>\n<td>Windows Authenticode (EV) cert<\/td>\n<td><strong>Open<\/strong> — procurement (only blocks signed Windows installer).<\/td>\n<\/tr>\n<tr>\n<td>Q10<\/td>\n<td>ndcode <code>bun build --compile<\/code> to one binary?<\/td>\n<td><strong>Yes (by design)<\/strong> — Bun app, upstream opencode ships compiled binaries; pin in manifest.<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>Only Q8/Q9 remain, and both are ship-time signing concerns — neither blocks the\ndev-run goal.<\/p>\n<h2 id=\"end-to-end-verification-gate-dev-run\">End-to-end verification gate — dev run<\/h2>\n<ul>\n<li>[x] Local headless Hermes (<code>hermes gateway<\/code>) → <code>GET :8642/health<\/code> → <code>{\"status\":\"ok\",\"version\":\"0.14.0\"}<\/code>.<\/li>\n<li>[x] One hub base URL + key drives <strong>Hermes<\/strong> (<code>config.yaml<\/code>) and <strong>ndcode<\/strong> (env) — same <code>api.neuraldeep.ru/v1<\/code> + <code>sk-x9…<\/code>.<\/li>\n<li>[x] Chat streams UI → Hermes → <strong>NeuralDeep free tier<\/strong> → back, rendered in the running dev app (<code>NEURALDEEP_FREE_TIER_OK<\/code>). Screenshot: <code>../../neuraldeep-desktop-devrun.png<\/code>.<\/li>\n<li>[x] Full harness engaged (≈15k-token system prompt: skills + memory + tools).<\/li>\n<li>[x] ndcode coding worker: headless <code>run<\/code>/<code>serve<\/code> confirmed from source; Hermes <code>ndcode<\/code> skill authored + installed (<code>~/.hermes/skills/autonomous-ai-agents/ndcode/SKILL.md<\/code>); dev PATH wrapper installed.<\/li>\n<li>[x] <code>THIRD_PARTY_LICENSES.md<\/code> present; branding is Neural Deep only.<\/li>\n<li>[x] <strong>Native Tauri desktop app<\/strong> (<code>app/src-tauri/<\/code>) builds and runs: Rust host spawns/supervises Hermes, streams chat via a <code>Channel<\/code>. Verified live in the native window (<code>../../tauri-window-chat.png<\/code>) — <code>NEURALDEEP_FREE_TIER_OK<\/code> through the Rust path (subtitle \"desktop\" confirms Tauri transport, not the web proxy).<\/li>\n<\/ul>\n<h3 id=\"deferred-out-of-scope-for-the-dev-run-goal\">Deferred (out of scope for the dev-run goal)<\/h3>\n<ul>\n<li>[ ] Live ndcode coding delegation smoke (<code>NDCODE_SMOKE_OK<\/code>) — requires building/booting the\n      ndcode Bun CLI; headless capability already proven from source.<\/li>\n<li>[x] Tauri native shell (<code>app/src-tauri/<\/code>) — built and running.<\/li>\n<li>[ ] Signing/notarization of the bundle (<code>tauri build<\/code>, task 09) — needs the notarytool\n      profile (Q8) / Windows EV cert (Q9); <code>tauri:dev<\/code> runs unsigned, which is fine for dev.<\/li>\n<li>[ ] Clean-machine first-run provisioning via <code>uv<\/code> (task_06) — reused the existing\n      <code>~/.hermes<\/code> install for the dev run.<\/li>\n<\/ul>\n<h2 id=\"risks-status\">Risks (status)<\/h2>\n<ul>\n<li>Hermes chat API stability — <strong>mitigated<\/strong>: api_server is a stable, OpenAI-compatible mode;\n  transport isolated behind the <code>/hermes<\/code> proxy adapter; Hermes version pinned (v0.14.0).<\/li>\n<li>Python provisioning fragility — <strong>N/A for dev<\/strong> (reused install); covered by uv plan for ship.<\/li>\n<li>Two runtimes (Python + Bun) — ndcode compiles to one native binary; Python via uv.<\/li>\n<li>Nous-account creep — <strong>closed (Q2)<\/strong>: account-less local run verified.<\/li>\n<li>Trademark — <strong>handled (task_10)<\/strong>: ship as Neural Deep only.<\/li>\n<\/ul>"}, "docs/services/README.md": {"rel": "docs/services/README.md", "area": "docs/services", "title": "Services / components", "size": 545, "html": "<h1 id=\"services-components\">Services / components<\/h1>\n<ul>\n<li><a href=\"./desktop-app/README.md\">desktop-app<\/a> — the Neural Deep Tauri shell: React chat UI,\n  transport selector, and the Rust host that supervises Hermes and streams chat.<\/li>\n<\/ul>\n<blockquote>\n<p>The <strong>backend<\/strong> (Hermes harness on <code>:8642<\/code>) and the <strong>NeuralDeep hub<\/strong> (proxy) are external\nto this repo; they are documented in <a href=\"../reference/hermes-backend.md\">reference/hermes-backend<\/a>.<\/p>\n<\/blockquote>"}, "docs/services/desktop-app/README.md": {"rel": "docs/services/desktop-app/README.md", "area": "docs/services/desktop-app", "title": "desktop-app — Neural Deep (Tauri shell)", "size": 3102, "html": "<h1 id=\"desktop-app-neural-deep-tauri-shell\">desktop-app — Neural Deep (Tauri shell)<\/h1>\n<p>The native desktop application: a thin React 19 chat in a Tauri v2 webview, driven by a Rust\nhost that owns the Hermes backend lifecycle and the chat stream.<\/p>\n<h2 id=\"layout\">Layout<\/h2>\n<pre><code>app/\n├── index.html · vite.config.ts        # Vite entry + dev /hermes proxy\n├── package.json                       # react19 + @tauri-apps/{api,cli}\n├── src/\n│   ├── main.tsx                       # React bootstrap\n│   ├── App.tsx                        # chat UI (engine badge, streaming, stop)\n│   ├── transport.ts                   # Tauri Channel | browser fetch-SSE selector\n│   └── styles.css\n└── src-tauri/\n    ├── Cargo.toml                     # tauri2, reqwest(stream), tokio, futures-util, dirs\n    ├── tauri.conf.json                # productName, Developer ID, icons, identifier\n    ├── capabilities/default.json\n    └── src/{main.rs, lib.rs}          # Rust host\n<\/code><\/pre>\n<h2 id=\"rust-host-src-taurisrclibrs\">Rust host (<code>src-tauri/src/lib.rs<\/code>)<\/h2>\n<table>\n<thead>\n<tr>\n<th>Item<\/th>\n<th>Responsibility<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><code>read_env_key()<\/code> / <code>read_hub_key()<\/code><\/td>\n<td><code>API_SERVER_KEY<\/code> from <code>~/.hermes/.env<\/code>; hub key from <code>.env<\/code>/<code>config.yaml<\/code><\/td>\n<\/tr>\n<tr>\n<td><code>ensure_backend()<\/code><\/td>\n<td>health-check <code>:8642<\/code>; spawn <code>hermes gateway<\/code> (cwd = home) if down, else reuse<\/td>\n<\/tr>\n<tr>\n<td><code>hermes_health()<\/code> (command)<\/td>\n<td>proxied health for the engine badge<\/td>\n<\/tr>\n<tr>\n<td><code>create_session()<\/code> (command)<\/td>\n<td><code>POST /api/sessions<\/code> → session id<\/td>\n<\/tr>\n<tr>\n<td><code>chat_stream(session_id, message, Channel)<\/code> (command)<\/td>\n<td>drive <code>POST /api/sessions/{id}/chat/stream<\/code>; parse <strong>named<\/strong> SSE; emit <code>Delta<\/code>/<code>Reasoning<\/code>/<code>Tool<\/code>/<code>Done<\/code>/<code>Error<\/code><\/td>\n<\/tr>\n<tr>\n<td><code>agent_info()<\/code> (command)<\/td>\n<td>the agent working dir (shown as <code>📁 ~<\/code>)<\/td>\n<\/tr>\n<tr>\n<td><code>subscription()<\/code> (command)<\/td>\n<td>hub tariff via <code>hub.neuraldeep.ru/api/cli/status<\/code> (tier / user / models)<\/td>\n<\/tr>\n<tr>\n<td>window <code>Destroyed<\/code> handler<\/td>\n<td>kill the gateway <strong>only if we spawned it<\/strong><\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"frontend-src\">Frontend (<code>src/<\/code>)<\/h2>\n<p><code>App.tsx<\/code> renders the chat (streamed content, a collapsible <strong>reasoning<\/strong> panel fed by\n<code>tool.progress<\/code>/<code>_thinking<\/code>, tool-step chips, token usage), a <strong>subscription<\/strong> badge, an\nengine badge, and a status bar with the <strong>working folder<\/strong> + a reasoning toggle.\n<code>transport.ts<\/code> picks the path by <code>isTauri<\/code> (<code>__TAURI_INTERNALS__<\/code>): native → Rust commands +\n<code>Channel<\/code>; browser → the same Hermes session API through the Vite <code>/hermes<\/code> proxy. The\nreasoning/tool events come from Hermes' session stream, <strong>not<\/strong> <code>/v1/chat/completions<\/code> (which\nstrips reasoning).<\/p>\n<h2 id=\"run\">Run<\/h2>\n<p>See <a href=\"../../guides/run-dev.md\">run-dev<\/a>. TL;DR: <code>bun run tauri:dev<\/code> (native) or <code>bun run dev<\/code>\n(browser). Distributable: <code>bun run tauri:build<\/code> (signing/notarization → see\n<a href=\"../../reference/packaging.md\">packaging<\/a>).<\/p>"}, "patches/README.md": {"rel": "patches/README.md", "area": "patches", "title": "Patches", "size": 1509, "html": "<h1 id=\"patches\">Patches<\/h1>\n<p>Local patches applied to the <strong>provisioned Hermes harness<\/strong> (<code>~/.hermes/hermes-agent<\/code>),\nwhich lives outside this repo and is overwritten on a Hermes upgrade. Re-apply after any\n<code>hermes update<\/code>.<\/p>\n<h2 id=\"hermes-api_server-reasoningpatch\"><code>hermes-api_server-reasoning.patch<\/code><\/h2>\n<p><strong>Why:<\/strong> Hermes' <code>api_server<\/code> session-chat stream did not forward the model's\nchain-of-thought. The plumbing exists (<code>agent.reasoning_callback<\/code> →\n<code>run_agent._fire_reasoning_delta<\/code>, fed by streaming <code>reasoning_content<\/code> deltas), but\n<code>_create_agent<\/code> / <code>_run_agent<\/code> never wired a <code>reasoning_callback<\/code>, so reasoning was generated\n(and paid for) but dropped. Only sporadic intermediate-turn <code>reasoning.available<\/code>\n(<code>tool.progress<\/code>/<code>_thinking<\/code>) events leaked through.<\/p>\n<p><strong>What it does:<\/strong> threads a <code>reasoning_callback<\/code> through <code>_create_agent<\/code> and <code>_run_agent<\/code>,\nand in <code>_handle_session_chat_stream<\/code> emits a new named SSE event\n<code>event: reasoning.delta\\ndata: {\"delta\": \"&lt;text&gt;\"}<\/code> for each streaming reasoning chunk. The\ndesktop renders these in the collapsible <strong>reasoning<\/strong> panel.<\/p>\n<p><strong>Apply:<\/strong><\/p>\n<pre><code class=\"language-bash\">cd ~/.hermes/hermes-agent\npatch -p0 &lt; /path/to/NeuralDeepDesktop/patches/hermes-api_server-reasoning.patch\npkill -f &quot;hermes gateway&quot;; hermes gateway   # restart to load\n<\/code><\/pre>\n<p>A timestamped backup of the original is at\n<code>~/.hermes/hermes-agent/gateway/platforms/api_server.py.bak.ndd<\/code>.<\/p>\n<blockquote>\n<p>Upstream-friendly: this is additive (new optional kwarg + new event), so it could be sent\nas a PR to NousResearch/hermes-agent to make reasoning a first-class session-stream event.<\/p>\n<\/blockquote>"}, "skills/ndcode/SKILL.md": {"rel": "skills/ndcode/SKILL.md", "area": "skills", "title": "ndcode (NeuralDeepCode) CLI", "size": 3710, "html": "<h1 id=\"ndcode-neuraldeepcode-cli\">ndcode (NeuralDeepCode) CLI<\/h1>\n<p>Use <strong>ndcode<\/strong> as Hermes' autonomous coding worker, orchestrated via the terminal/process\ntools. ndcode is a rebranded, hub-integrated MIT fork of <code>sst/opencode<\/code> (TypeScript, Bun).\nIt retains upstream opencode's headless <code>run<\/code> and <code>serve<\/code> subcommands (verified in\n<code>packages/ndcode/src/index.ts<\/code>: <code>.command(RunCommand)<\/code>, <code>.command(ServeCommand)<\/code>).<\/p>\n<p>Every model call ndcode makes is routed through the <strong>NeuralDeep hub<\/strong>\n(<code>https://api.neuraldeep.ru/v1<\/code>) — the same single proxy Hermes uses.<\/p>\n<h2 id=\"when-to-use\">When to Use<\/h2>\n<ul>\n<li>You want an external coding agent to implement/refactor/review code<\/li>\n<li>Long-running coding sessions with progress checks<\/li>\n<li>Parallel task execution in isolated workdirs/worktrees<\/li>\n<\/ul>\n<h2 id=\"non-interactive-hub-auth-no-browser-login\">Non-interactive hub auth (no browser /login)<\/h2>\n<p>ndcode's <code>/login<\/code> is an interactive browser SSO. For headless delegation, <strong>skip it<\/strong> and\nauthenticate via env instead:<\/p>\n<pre><code>NEURALDEEP_API_KEY=sk-...           # hub key (free tier ok)\nNEURALDEEP_API_BASE=https://api.neuraldeep.ru/v1\n<\/code><\/pre>\n<p>These are already exported for the Hermes process by the Neural Deep desktop host, so\n<code>ndcode run<\/code> works without any interactive step.<\/p>\n<h2 id=\"binary-resolution\">Binary Resolution<\/h2>\n<p>Production bundle ships a single native <code>ndcode<\/code> binary (<code>bun build --compile<\/code>) on PATH.\nIn dev, a launcher wrapper execs the Bun entrypoint. Verify:<\/p>\n<pre><code>terminal(command=&quot;which -a ndcode&quot;)\nterminal(command=&quot;ndcode --version&quot;)\n<\/code><\/pre>\n<h2 id=\"one-shot-tasks-preferred\">One-Shot Tasks (preferred)<\/h2>\n<p>Use <code>ndcode run<\/code> for bounded, non-interactive tasks:<\/p>\n<pre><code>terminal(command=&quot;ndcode run 'Add retry logic to API calls and update tests'&quot;, workdir=&quot;~/project&quot;)\n<\/code><\/pre>\n<p>Force a hub model:<\/p>\n<pre><code>terminal(command=&quot;ndcode run 'Refactor auth module' --model neuraldeep/qwen3.6-35b-a3b&quot;, workdir=&quot;~/project&quot;)\n<\/code><\/pre>\n<p>Attach context files with <code>-f<\/code>, show thinking with <code>--thinking<\/code>, machine output with\n<code>--format json<\/code> (same flag surface as upstream opencode).<\/p>\n<h2 id=\"interactive-sessions-background\">Interactive Sessions (Background)<\/h2>\n<p>For iterative work, start the TUI in background and drive it via <code>process<\/code>:<\/p>\n<pre><code>terminal(command=&quot;ndcode&quot;, workdir=&quot;~/project&quot;, background=true, pty=true)   # returns session_id\nprocess(action=&quot;submit&quot;, session_id=&quot;&lt;id&gt;&quot;, data=&quot;Implement OAuth refresh flow and add tests&quot;)\nprocess(action=&quot;poll&quot;, session_id=&quot;&lt;id&gt;&quot;)\nprocess(action=&quot;log&quot;, session_id=&quot;&lt;id&gt;&quot;)\nprocess(action=&quot;kill&quot;, session_id=&quot;&lt;id&gt;&quot;)   # exit with Ctrl+C (\\x03) or kill — never /exit\n<\/code><\/pre>\n<h2 id=\"server-mode-richer-streamable\">Server Mode (richer, streamable)<\/h2>\n<p><code>ndcode serve<\/code> starts an HTTP/SSE server (upstream opencode default <code>127.0.0.1:4096<\/code>,\nOpenAPI at <code>/doc<\/code>, SSE at <code>/event<\/code>). Use when you want to stream events programmatically;\notherwise prefer <code>run<\/code>.<\/p>\n<h2 id=\"verification\">Verification<\/h2>\n<pre><code>terminal(command=&quot;ndcode run 'Respond with exactly: NDCODE_SMOKE_OK'&quot;)\n<\/code><\/pre>\n<p>Success: output includes <code>NDCODE_SMOKE_OK<\/code>, exits without provider/model errors, and the\ncall appears against the NeuralDeep hub.<\/p>\n<h2 id=\"rules\">Rules<\/h2>\n<ol>\n<li>Prefer <code>ndcode run<\/code> for one-shot automation — no pty needed.<\/li>\n<li>Authenticate via <code>NEURALDEEP_API_KEY<\/code> env, never the interactive <code>/login<\/code>, in headless mode.<\/li>\n<li>Scope each ndcode session to a single repo/workdir; use separate workdirs for parallel work.<\/li>\n<li>For long tasks, stream progress from <code>process(action=\"log\"|\"poll\")<\/code>.<\/li>\n<li>Report concrete outcomes (files changed, tests, remaining risks).<\/li>\n<li>Exit interactive sessions with Ctrl+C or kill, never <code>/exit<\/code>.<\/li>\n<\/ol>"}}, "nodes": [{"id": "area::(root)", "label": "(root)", "kind": "area", "area": "(root)", "size": 0, "lvl": 1, "ang": 0.8727, "root": false}, {"id": "area::app", "label": "app", "kind": "area", "area": "app", "size": 0, "lvl": 4, "ang": 0.1745, "root": false}, {"id": "area::docs", "label": "docs", "kind": "area", "area": "docs", "size": 0, "lvl": 2, "ang": 1.2217, "root": false}, {"id": "area::docs/decisions", "label": "docs/decisions", "kind": "area", "area": "docs/decisions", "size": 0, "lvl": 3, "ang": 1.5708, "root": false}, {"id": "area::docs/guides", "label": "docs/guides", "kind": "area", "area": "docs/guides", "size": 0, "lvl": 2, "ang": 5.0615, "root": false}, {"id": "area::docs/reference", "label": "docs/reference", "kind": "area", "area": "docs/reference", "size": 0, "lvl": 2, "ang": 5.7596, "root": false}, {"id": "area::docs/services", "label": "docs/services", "kind": "area", "area": "docs/services", "size": 0, "lvl": 3, "ang": 4.3633, "root": false}, {"id": "area::docs/services/desktop-app", "label": "docs/services/desktop-app", "kind": "area", "area": "docs/services/desktop-app", "size": 0, "lvl": 3, "ang": 4.7124, "root": false}, {"id": "area::patches", "label": "patches", "kind": "area", "area": "patches", "size": 0, "lvl": 4, "ang": 3.316  N.forEach(n=>{n.vx+=(G.W/2-n.x)*.001;n.vy+=(G.H/2-n.y)*.001;if(n===G.drag)return;n.x+=n.vx*=.85;n.y+=n.vy*=.85;});}
function loop(){($('#physics').checked?physics:spider)();draw();requestAnimationFrame(loop);}
function draw(){ctx.clearRect(0,0,G.W,G.H);const v=G.view;ctx.save();ctx.translate(v.x,v.y);ctx.scale(v.k,v.k);
 const sr=$('#showref').checked,so=$('#showown').checked,phys=$('#physics').checked;
 if(!phys){ctx.strokeStyle='rgba(255,255,255,.04)';for(let l=1;l<=G.maxlvl;l++){ctx.beginPath();ctx.arc(G.cx,G.cy,l*G.gap*(1-Math.pow(1-G.grow,3)),0,7);ctx.stroke();}}
 G.edges.forEach(e=>{if(e.tree||(e.kind==='ref'&&!sr)||(e.kind==='own'&&!so))return;const a=G.nodes[e.s],b=G.nodes[e.t];ctx.strokeStyle=e.kind==='ref'?'rgba(0,255,136,.13)':'rgba(120,120,120,.07)';ctx.lineWidth=.6;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();});
 G.edges.forEach(e=>{if(!e.tree||(e.kind==='ref'&&!sr)||(e.kind==='own'&&!so))return;const a=G.nodes[e.s],b=G.nodes[e.t],par=a.lvl<=b.lvl?a:b,hot=G.hover&&(a===G.hover||b===G.hover);
  ctx.strokeStyle=hot?'rgba(255,255,255,.7)':(COL[grp(par.area)]+'66');ctx.lineWidth=hot?1.6:1;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();});
 G.nodes.forEach(n=>{if(n.root){ctx.beginPath();ctx.arc(n.x,n.y,n.r+7,0,7);ctx.fillStyle='rgba(255,255,255,.1)';ctx.fill();}
  ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,7);ctx.fillStyle=n.col;ctx.fill();if(n.kind==='area'||n.root){ctx.strokeStyle=n.root?'#00ff88':'#000';ctx.lineWidth=n.root?2:1.4;ctx.stroke();}
  if(n.root||n.kind==='area'||n===G.hover||v.k>1.7){ctx.fillStyle=n.root?'#00ff88':(n===G.hover?'#fff':'#bdbdbd');ctx.font=((n.root||n.kind==='area')?'600 ':'')+(n.root?13:11)+'px '+getComputedStyle(document.body).getPropertyValue('--mono');
   ctx.fillText(n.root?(DATA.root+' ◀ вход'):(n.kind==='area'?n.label:n.label.slice(0,30)),n.x+n.r+4,n.y+3);}});ctx.restore();}
function legend(){const groups={};DATA.nodes.forEach(n=>{const g=grp(n.area);groups[g]=(groups[g]||0)+1;});
 const rank=x=>x==='docs'?1:x==='root'?2:0;  // сервисы первыми, docs/root в конце
 const order=Object.keys(groups).sort((a,b)=>rank(a)-rank(b)||a.localeCompare(b));
 const lbl={docs:'docs/* (сквозное)',root:'корень/прочее'};
 $('#legend').innerHTML='<div class="row" style="color:#00ff88">● '+DATA.root+' = вход</div>'+
  order.map(g=>'<div class="row"><span class="dot" style="background:'+colorOf(g)+'"></span>'+(lbl[g]||g)+' <span style="color:var(--muted)">'+groups[g]+'</span></div>').join('')+
  '<div class="row" style="color:var(--muted);margin-top:4px">кольцо = шагов от входа</div>';}
function tw(mx,my){return{x:(mx-G.view.x)/G.view.k,y:(my-G.view.y)/G.view.k};}
function pick(mx,my){const w=tw(mx,my);let b=null,bd=1e9;G.nodes.forEach(n=>{const d=(n.x-w.x)**2+(n.y-w.y)**2;if(d<bd&&d<(n.r+6)**2){bd=d;b=n;}});return b;}
cv.addEventListener('mousedown',e=>{const r=cv.getBoundingClientRect();const n=pick(e.clientX-r.left,e.clientY-r.top);G.moved=false;if(n){G.drag=n;G.ds={x:e.clientX,y:e.clientY};}else G.pan={x:e.clientX,y:e.clientY,vx:G.view.x,vy:G.view.y};});
cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
 if(G.drag){const w=tw(mx,my);G.drag.x=w.x;G.drag.y=w.y;if(G.ds&&Math.abs(e.clientX-G.ds.x)+Math.abs(e.clientY-G.ds.y)>4)G.moved=true;return;}
 if(G.pan){G.view.x=G.pan.vx+(e.clientX-G.pan.x);G.view.y=G.pan.vy+(e.clientY-G.pan.y);return;}
 const n=pick(mx,my);G.hover=n;const tip=$('#tip');if(n){tip.style.display='block';tip.style.left=(mx+16)+'px';tip.style.top=(my+12)+'px';
  tip.innerHTML='<div>'+esc(n.root?DATA.root:n.label)+'</div><div class="s">'+esc(n.kind==='area'?n.area:(n.rel||'')+' · '+n.lvl+' шаг(ов)')+'</div>';}else tip.style.display='none';});
addEventListener('mouseup',()=>{if(G.drag){const n=G.drag;G.drag=null;if(!G.moved&&n.kind==='doc'){document.querySelector('.tab[data-v=browse]').click();open(n.rel);}}G.pan=null;});
cv.addEventListener('wheel',e=>{e.preventDefault();const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,f=e.deltaY<0?1.12:.89,w=tw(mx,my);G.view.k=Math.max(.3,Math.min(5,G.view.k*f));G.view.x=mx-w.x*G.view.k;G.view.y=my-w.y*G.view.k;},{passive:false});
$('#reheat').onclick=()=>{if(!G.on)return;layout();G.nodes.forEach(n=>{n.x=G.cx;n.y=G.cy;n.vx=0;n.vy=0;});G.grow=0;};
$('#physics').onchange=()=>{if(!$('#physics').checked&&G.on){layout();G.grow=1;}};
open(DATA.files[DATA.root]?DATA.root:Object.keys(F)[0]);
</script></body></html>
