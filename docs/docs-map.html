ern to copy.<\/li>\n<\/ul>"}, "tasks_01/task_04.md": {"rel": "tasks_01/task_04.md", "area": "tasks_01", "title": "task_04 — fathah/hermes-desktop: backend layer to lift", "size": 4123, "html": "<h1 id=\"task_04-fathahhermes-desktop-backend-layer-to-lift\">task_04 — fathah/hermes-desktop: backend layer to lift<\/h1>\n<blockquote>\n<p>Status: <code>research<\/code> (source-read pending) · Depends on: task_02 · Blocks: task_06, task_08<\/p>\n<\/blockquote>\n<h2 id=\"goal\">Goal<\/h2>\n<p>Extract the <em>backend layer<\/em> (not the UI) from <code>fathah/hermes-desktop<\/code> — the proven, MIT code\nfor (a) provisioning/managing a local Hermes and (b) streaming chat over a local API — so we\ndon't reinvent it. We drop its Electron UI; we keep its know-how.<\/p>\n<h2 id=\"what-fathahhermes-desktop-is-research-findings\">What fathah/hermes-desktop is (research findings)<\/h2>\n<ul>\n<li>\"Hermes One\" — a <strong>community-maintained native desktop app<\/strong> (Electron) for installing,\n  configuring, and <strong>chatting<\/strong> with Hermes Agent. MIT. ~12.5k stars, ~1.4k forks, v0.6.35,\n  39+ releases, 1000+ commits — actively maintained. (Source: repo page.)<\/li>\n<li><strong>Full streaming chat UI via SSE<\/strong> — tool-progress indicators, markdown, syntax highlight,\n  token/cost, 22 slash commands. This is the chat surface the official <code>web/<\/code> lacks.<\/li>\n<li><strong>Backend handling:<\/strong> installs + manages Hermes locally in <code>~/.hermes<\/code> (with dependency\n  resolution / guided first-run installer) <strong>or<\/strong> connects to a <strong>remote Hermes API by\n  URL + key<\/strong>. Routes chat through <strong><code>http://127.0.0.1:8642<\/code> with SSE<\/strong>. SQLite (FTS5) for\n  session history; config in <code>~/.hermes<\/code> YAML + <code>.env<\/code>.<\/li>\n<li>Multi-provider LLM incl. <strong>local endpoints<\/strong> (so our proxy fits). 14 toolsets, 16 messaging\n  gateways, memory providers, cron, etc. — i.e. it exposes the <em>full<\/em> harness.<\/li>\n<li>Described as <strong>pluggable agent backend<\/strong> (swap Hermes for another agent).<\/li>\n<\/ul>\n<h2 id=\"why-lift-it-not-fork-the-whole-thing\">Why lift it (not fork the whole thing)<\/h2>\n<ul>\n<li>It already solved our two hardest backend unknowns: <strong>provisioning Hermes<\/strong> and <strong>chat SSE\n  transport<\/strong>. MIT → we can copy.<\/li>\n<li>We do <strong>not<\/strong> want its Electron shell (heavy; we want a thin Tauri wrapper — task_07).<\/li>\n<li>Risk: its chat path may reach into Hermes internals on a non-stable API (same fragility as\n  nesquena/hermes-webui). Confirm how stable/portable it is.<\/li>\n<\/ul>\n<h2 id=\"tasks-source-reading-be-concrete\">Tasks (source reading — be concrete)<\/h2>\n<ul>\n<li>[ ] <strong>T4.1<\/strong> Clone <code>fathah/hermes-desktop<\/code>. Locate the <strong>provisioning<\/strong> code: how it\n      installs Hermes into <code>~/.hermes<\/code>, resolves Python deps, and detects an existing install.\n      Note Python/uv/pip usage we can mirror (task_06).<\/li>\n<li>[ ] <strong>T4.2<\/strong> Locate the <strong>chat transport<\/strong>: what exact local endpoint/route it POSTs a\n      message to and reads the <strong>SSE<\/strong> stream from (the <code>:8642<\/code> server). Capture: request\n      shape, SSE event types (token deltas, tool progress, usage, done), and how <code>:8642<\/code> is\n      started (does the desktop spawn a Hermes server subprocess? which command?).<\/li>\n<li>[ ] <strong>T4.3<\/strong> Determine whether <code>:8642<\/code> is (a) an official Hermes server mode, (b) a small\n      proxy the desktop runs in front of Hermes, or (c) direct module import. This decides how\n      portable the pattern is.<\/li>\n<li>[ ] <strong>T4.4<\/strong> Capture the <strong>remote mode<\/strong> (URL + API key) contract — useful as our \"connect\n      to a hosted Hermes\" option and as a test harness.<\/li>\n<li>[ ] <strong>T4.5<\/strong> Capture the <strong>model/provider config<\/strong> path it uses to point Hermes at a custom\n      endpoint (cross-ref task_05).<\/li>\n<li>[ ] <strong>T4.6<\/strong> Produce <code>docs/hermes-backend-notes.md<\/code> in our repo: the distilled, citeable\n      \"how to provision + how to chat-stream\" spec we implement in task_06/task_08.<\/li>\n<\/ul>\n<h2 id=\"acceptance-criteria\">Acceptance criteria<\/h2>\n<ul>\n<li>[ ] A written spec (ours) of: provisioning steps, the chat endpoint + SSE event schema, and\n      how the local Hermes server is launched — all traceable to fathah source files.<\/li>\n<li>[ ] A clear verdict: is the <code>:8642<\/code> SSE path stable enough to depend on, or do we need a\n      thin adapter / wait for Hermes' stable API (#1925/#2491)?<\/li>\n<\/ul>\n<h2 id=\"primary-sources\">Primary sources<\/h2>\n<ul>\n<li><code>github.com/fathah/hermes-desktop<\/code> — README + source (<code>api/streaming<\/code>, installer/provision\n  code, IPC). MIT.<\/li>\n<li>Cross-ref: <code>github.com/nesquena/hermes-webui<\/code> (alt pattern: stdlib HTTP on <code>:8787<\/code>, SSE,\n  <strong>direct module import<\/strong> — explicitly \"tightly coupled until stable API boundary work\n  completes (#1925, #2491)\") — a second data point on how others stream Hermes chat.<\/li>\n<li><code>github.com/EKKOLearnAI/hermes-web-ui<\/code> / <code>outsourc-e/hermes-workspace<\/code> — additional\n  reference wrappers if the above are insufficient.<\/li>\n<\/ul>"}, "tasks_01/task_05.md": {"rel": "tasks_01/task_05.md", "area": "tasks_01", "title": "task_05 — Single model proxy (NeuralDeep hub / LiteLLM)", "size": 3487, "html": "<h1 id=\"task_05-single-model-proxy-neuraldeep-hub-litellm\">task_05 — Single model proxy (NeuralDeep hub / LiteLLM)<\/h1>\n<blockquote>\n<p>Status: <code>research<\/code> + <code>build<\/code> · Depends on: task_01 · Blocks: task_02, task_03, task_08<\/p>\n<\/blockquote>\n<h2 id=\"goal\">Goal<\/h2>\n<p>Make <strong>both<\/strong> harnesses (Hermes core + ndcode worker) route <strong>every<\/strong> model call through\n<strong>one<\/strong> OpenAI-compatible gateway — the NeuralDeep hub — so models, keys, routing, and cost\nare centralized. The proxy stays <strong>external<\/strong> to the desktop bundle (lightest packaging).<\/p>\n<h2 id=\"decision\">Decision<\/h2>\n<ul>\n<li><strong>Proxy = external NeuralDeep hub<\/strong> (OpenAI-compatible: one base URL + key). The desktop\n  does <strong>not<\/strong> bundle a proxy. Rationale: zero packaging weight, single source of truth for\n  models/keys/cost, matches how ndcode already works.<\/li>\n<li><strong>LiteLLM<\/strong> is the documented fallback/alt if a <em>local<\/em> proxy is ever wanted (it's an\n  OpenAI-compatible proxy with model list, virtual keys, routing, cost/observability) — keep\n  as an optional, not in the default bundle.<\/li>\n<\/ul>\n<h2 id=\"per-harness-wiring\">Per-harness wiring<\/h2>\n<h3 id=\"ndcode-already-solved\">ndcode (already solved)<\/h3>\n<ul>\n<li>ndcode natively targets the hub: <code>/login<\/code> SSO, provider <code>neuraldeep<\/code>, endpoint overrides\n  <code>NEURALDEEP_HUB<\/code> / <code>NEURALDEEP_API_BASE<\/code>, config via <code>NDC_*<\/code> env. (Source: ndcode README.)<\/li>\n<li>For <strong>headless<\/strong> use (task_03) we need a <strong>non-interactive<\/strong> auth path (API key env instead\n  of browser <code>/login<\/code>). Confirm the env var ndcode reads for a hub key.<\/li>\n<\/ul>\n<h3 id=\"hermes-to-wire\">Hermes (to wire)<\/h3>\n<ul>\n<li>Hermes supports \"custom endpoints\" + provider switching (<code>hermes model<\/code>, and\n  <code>GET/PUT /api/config<\/code>, <code>/api/config/raw<\/code> YAML, <code>/api/model/options|set<\/code>, <code>/api/env<\/code>).<\/li>\n<li><strong>Task:<\/strong> confirm the exact config keys to register an <strong>OpenAI-compatible custom provider<\/strong>\n  pointing at the hub base URL + key, and to select a hub model as the main model (plus\n  auxiliary models for titles/summaries). Likely a <code>providers<\/code>/<code>model<\/code> block in the Hermes\n  config YAML and/or an env-based OpenAI-compatible provider.<\/li>\n<\/ul>\n<h2 id=\"tasks\">Tasks<\/h2>\n<ul>\n<li>[ ] <strong>T5.1<\/strong> Confirm the NeuralDeep hub's OpenAI-compatible surface: base URL shape\n      (<code>…/v1<\/code>?), <code>/models<\/code> listing, <code>/chat/completions<\/code> streaming, auth header. Capture one\n      working <code>curl<\/code>.<\/li>\n<li>[ ] <strong>T5.2<\/strong> Hermes: write the config (YAML via <code>/api/config/raw<\/code> or file) that registers\n      the hub as a custom OpenAI-compatible provider and sets main + auxiliary models. Verify\n      via <code>/api/model/info<\/code>.<\/li>\n<li>[ ] <strong>T5.3<\/strong> ndcode: confirm the non-interactive hub auth (key env) for headless runs;\n      document the env set the sidecar injects.<\/li>\n<li>[ ] <strong>T5.4<\/strong> Verify <strong>both<\/strong> harnesses hit the <strong>same<\/strong> base URL/key (grep their effective\n      config at runtime). One proxy, two clients.<\/li>\n<li>[ ] <strong>T5.5<\/strong> (Optional) Document a local-LiteLLM profile for offline/dev: minimal\n      <code>config.yaml<\/code> (model_list → hub or local models, virtual key), and how each harness\n      points at <code>http://127.0.0.1:4000<\/code>.<\/li>\n<\/ul>\n<h2 id=\"acceptance-criteria\">Acceptance criteria<\/h2>\n<ul>\n<li>[ ] One base URL + key drives Hermes <em>and<\/em> ndcode; switching the hub URL/key in settings\n      reconfigures both.<\/li>\n<li>[ ] A model picker in the wrapper is populated from the hub (via Hermes <code>/api/model/options<\/code>\n      and/or the hub <code>/models<\/code>).<\/li>\n<li>[ ] No second proxy is bundled by default.<\/li>\n<\/ul>\n<h2 id=\"primary-sources\">Primary sources<\/h2>\n<ul>\n<li><code>github.com/vakovalskii/NeuralDeepCode<\/code> — <code>NEURALDEEP_HUB<\/code>, <code>NEURALDEEP_API_BASE<\/code>, <code>NDC_*<\/code>,\n  <code>neuraldeep<\/code> provider.<\/li>\n<li><code>github.com/NousResearch/hermes-agent<\/code> — <code>web/src/lib/api.ts<\/code> config/model/env endpoints;\n  <code>docs/<\/code> provider configuration.<\/li>\n<li>LiteLLM proxy docs (<code>docs.litellm.ai<\/code>) — OpenAI-compatible proxy, model_list, virtual keys,\n  routing, cost (optional local path).<\/li>\n<\/ul>"}, "tasks_01/task_06.md": {"rel": "tasks_01/task_06.md", "area": "tasks_01", "title": "task_06 — Backend packaging (uv + standalone CPython + sidecar)", "size": 4227, "html": "<h1 id=\"task_06-backend-packaging-uv-standalone-cpython-sidecar\">task_06 — Backend packaging (uv + standalone CPython + sidecar)<\/h1>\n<blockquote>\n<p>Status: <code>build<\/code> · Depends on: task_02, task_03, task_04 · Blocks: task_09<\/p>\n<\/blockquote>\n<h2 id=\"goal\">Goal<\/h2>\n<p>Package \"the full harness\" so it's <strong>easy to ship<\/strong> on Mac + Windows while keeping the\n<strong>installer light<\/strong>: bundle only native/static bits; provision the heavy Python Hermes on\nfirst run, deterministically.<\/p>\n<h2 id=\"the-packaging-problem-research\">The packaging problem (research)<\/h2>\n<table>\n<thead>\n<tr>\n<th>Component<\/th>\n<th>Runtime<\/th>\n<th>Packaging difficulty<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Hermes (core)<\/td>\n<td><strong>Python<\/strong> (FastAPI, SQLite FTS5, many deps)<\/td>\n<td>🔴 hard — runtime + deps<\/td>\n<\/tr>\n<tr>\n<td>ndcode (worker)<\/td>\n<td><strong>Bun<\/strong> / native<\/td>\n<td>🟢 <code>bun build --compile<\/code> → 1 binary (task_03)<\/td>\n<\/tr>\n<tr>\n<td>Proxy<\/td>\n<td>external NeuralDeep hub<\/td>\n<td>🟢 nothing to bundle (task_05)<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>→ The only hard part is the Python harness. Three strategies were considered:<\/p>\n<ul>\n<li><strong>A. Bundle standalone CPython<\/strong> (python-build-standalone via <code>uv<\/code>) + venv in app Resources\n  — self-contained, <strong>offline<\/strong>, deterministic; heavier per-OS build.<\/li>\n<li><strong>B. Install-on-first-run<\/strong> into app-data (guided installer; this is fathah's model) —\n  lightest installer; needs network on first launch.<\/li>\n<li><strong>C. Remote backend<\/strong> (URL+key) — thinnest; needs a host.<\/li>\n<\/ul>\n<h2 id=\"decision\">Decision<\/h2>\n<p><strong>Hybrid A+B via <code>uv<\/code><\/strong> — best fit for \"light wrapper + full harness + easy package\":<\/p>\n<ol>\n<li><strong>Bundle (small):<\/strong> Tauri shell + native <code>ndcode<\/code> binary + a tiny <strong><code>uv<\/code><\/strong> binary\n   (per-target). No Python interpreter stuffed into the installer.<\/li>\n<li><strong>First run (provision):<\/strong> the sidecar runs <code>uv<\/code> to fetch a <strong>standalone CPython<\/strong> and\n   <code>uv pip install<\/code> the <strong>full<\/strong> Hermes into app-data (<code>~/Library/Application Support/NeuralDeep<\/code>\n   on macOS, <code>%APPDATA%\\NeuralDeep<\/code> on Windows). Deterministic, fast, identical across OSes;\n   cacheable for offline. (Optional later: pre-seed the CPython + wheels into Resources for a\n   fully offline first run = upgrade to pure strategy A.)<\/li>\n<li><strong>Run:<\/strong> the sidecar spawns Hermes <strong>headless<\/strong> as a local API (task_02/task_04) and keeps\n   it supervised.<\/li>\n<\/ol>\n<p>Result: backend = <strong>1 native binary (ndcode) + 1 uv-managed Python (full Hermes) + a thin\nlauncher<\/strong>; proxy external. Installer stays light; users still get the complete harness.<\/p>\n<h2 id=\"tasks\">Tasks<\/h2>\n<ul>\n<li>[ ] <strong>T6.1<\/strong> Choose the sidecar/launcher home: reuse the Tauri Rust host\n      (<code>src-tauri<\/code>, lifted from NeuralDeskApp) to spawn/supervise processes, OR a tiny Node/Bun\n      sidecar. Decision likely: <strong>Rust host spawns directly<\/strong> (fewest moving parts).<\/li>\n<li>[ ] <strong>T6.2<\/strong> Vendor per-target <code>uv<\/code> binaries; wire a Tauri <code>externalBin<\/code> for <code>uv<\/code>\n      (<code>bin/uv-&lt;triple&gt;<\/code>), like opencode was bundled in NeuralDeskApp.<\/li>\n<li>[ ] <strong>T6.3<\/strong> Implement first-run provisioning: <code>uv python install<\/code> (pinned CPython) +\n      <code>uv pip install hermes…<\/code> (or <code>uv tool install<\/code>) into app-data; idempotent; progress\n      surfaced to the UI; failure/retry handling; offline detection.<\/li>\n<li>[ ] <strong>T6.4<\/strong> Bundle <code>ndcode<\/code> as a native <code>externalBin<\/code> (<code>bin/ndcode-&lt;triple&gt;<\/code>) from\n      <code>bun build --compile<\/code> (task_03). Ensure it's on the Hermes process <code>PATH<\/code> (task_08).<\/li>\n<li>[ ] <strong>T6.5<\/strong> Implement backend lifecycle: start headless Hermes API, health-check\n      (poll <code>/api/status<\/code> or chat endpoint), restart on crash, clean shutdown on app exit.<\/li>\n<li>[ ] <strong>T6.6<\/strong> Pin versions: a manifest of {Hermes version, ndcode commit, CPython version,\n      uv version} for reproducible builds.<\/li>\n<li>[ ] <strong>T6.7<\/strong> Define app-data layout + first-run vs upgrade (re-provision on Hermes version\n      bump; preserve user memory/skills/sessions).<\/li>\n<\/ul>\n<h2 id=\"acceptance-criteria\">Acceptance criteria<\/h2>\n<ul>\n<li>[ ] Fresh machine → install app → first run provisions full Hermes via uv → headless API up\n      → chat works, ndcode delegation works — on <strong>both<\/strong> macOS and Windows.<\/li>\n<li>[ ] Installer size stays modest (shell + ndcode + uv; no giant Python blob unless offline\n      mode chosen).<\/li>\n<li>[ ] Backend survives crashes (supervised) and shuts down cleanly.<\/li>\n<\/ul>\n<h2 id=\"primary-sources\">Primary sources<\/h2>\n<ul>\n<li><code>astral.sh/uv<\/code> docs — <code>uv python install<\/code>, <code>uv pip<\/code>, standalone CPython\n  (python-build-standalone).<\/li>\n<li><code>github.com/fathah/hermes-desktop<\/code> — its provisioning approach (task_04).<\/li>\n<li>Tauri v2 <code>externalBin<\/code> / sidecar docs.<\/li>\n<li>NeuralDeskApp repo — existing <code>externalBin<\/code> bundling + <code>scripts/build-sidecar.cjs<\/code> pattern\n  (reuse).<\/li>\n<\/ul>"}, "tasks_01/task_07.md": {"rel": "tasks_01/task_07.md", "area": "tasks_01", "title": "task_07 — Light desktop wrapper (Tauri shell)", "size": 3729, "html": "<h1 id=\"task_07-light-desktop-wrapper-tauri-shell\">task_07 — Light desktop wrapper (Tauri shell)<\/h1>\n<blockquote>\n<p>Status: <code>build<\/code> · Depends on: task_01, task_08 · Blocks: task_09<\/p>\n<\/blockquote>\n<h2 id=\"goal\">Goal<\/h2>\n<p>Build the <strong>thin<\/strong> desktop: a Tauri shell with a clean streaming chat + minimal settings that\nspawns/supervises the backend (task_06) and talks to Hermes over HTTP+SSE (task_08). No\ncontrol-panel reimplementation; the harness stays full underneath.<\/p>\n<h2 id=\"decision-build-thin-reuse-our-skeleton\">Decision: build thin, reuse our skeleton<\/h2>\n<ul>\n<li><strong>Reuse the <code>NeuralDeskApp<\/code> Tauri shell<\/strong> (Rust host + React 19 + Vite + Tailwind + the\n  already-stripped chat UI + Developer-ID signing/notarization config). It is already a thin\n  chat shell on the exact stack Hermes' own <code>web/<\/code> uses, so porting pieces is cheap.<\/li>\n<li><strong>Do not<\/strong> adopt heavy frontends (Open WebUI, LibreChat, Lobe Chat) or the official\n  Hermes desktop binary (closed, Nous-Portal credit-gated). <strong>Do not<\/strong> ship fathah's Electron\n  UI (heavy). Borrow <em>patterns<\/em> (SSE chat rendering, slash commands), not the Electron code.<\/li>\n<\/ul>\n<h3 id=\"ui-landscape-reference-ranked-for-our-needs\">UI landscape (reference, ranked for our needs)<\/h3>\n<ul>\n<li><code>fathah/hermes-desktop<\/code> (Electron, MIT) — best Hermes chat UX → copy patterns, not code.<\/li>\n<li>Official Hermes <code>web/<\/code> (React19/Vite/Tailwind, MIT) — <strong>control panel<\/strong> pages\n  (config/models/skills/sessions) we can port for the \"minimal settings\".<\/li>\n<li><code>cc-switch<\/code> (Tauri/Rust/React, MIT) — provider/config switcher, not a chat client; a\n  reference for multi-tool config UX only.<\/li>\n<li><code>agentic-os<\/code> (FastAPI + vanilla JS, MIT) — opencode+Hermes+Gemini orchestration; reference\n  for the orchestration dashboard idea, not for adoption.<\/li>\n<li>Open WebUI / LibreChat / Lobe Chat — general LLM chat UIs; <strong>not<\/strong> agent-harness aware;\n  Open WebUI has branding-retention license clauses (check before any reuse — task_10).<\/li>\n<\/ul>\n<h2 id=\"scope-of-the-wrapper-day-one-keep-it-minimal\">Scope of the wrapper (day one — keep it minimal)<\/h2>\n<ul>\n<li><strong>Chat:<\/strong> message input, streaming assistant output (SSE), tool-progress indicators,\n  markdown + code highlight, token/cost readout, stop. (Hermes is agentic — render tool steps\n  and the ndcode delegation nicely.)<\/li>\n<li><strong>Sessions:<\/strong> list/open/delete/search (Hermes <code>/api/sessions*<\/code>).<\/li>\n<li><strong>Settings (minimal):<\/strong> the NeuralDeep hub base URL + key (one proxy), model pick\n  (<code>/api/model/options|set<\/code>), and a backend status/health panel (provisioning progress,\n  start/stop). Optionally surface skills toggle (<code>/api/skills<\/code>).<\/li>\n<li><strong>First-run:<\/strong> provisioning progress UI (task_06) + hub credentials entry.<\/li>\n<\/ul>\n<p>Out of scope day one: messaging gateways, cron, full profile/persona editors, MCP admin —\nall reachable later via Hermes' API if wanted.<\/p>\n<h2 id=\"tasks\">Tasks<\/h2>\n<ul>\n<li>[ ] <strong>T7.1<\/strong> Scaffold the wrapper from the NeuralDeskApp Tauri shell (Rust host + React) in\n      this repo; rebrand to Neural Deep; keep the chat shell + signing config.<\/li>\n<li>[ ] <strong>T7.2<\/strong> Replace the model-engine layer with the Hermes HTTP+SSE client (task_08):\n      send message → stream tokens/tool steps → render. Reuse the existing <code>StreamMessage<\/code>\n      rendering where possible.<\/li>\n<li>[ ] <strong>T7.3<\/strong> Settings → \"Engine\" tab: hub base URL + key + model select + backend status.<\/li>\n<li>[ ] <strong>T7.4<\/strong> First-run flow: provisioning progress + credentials; gate chat until backend\n      healthy.<\/li>\n<li>[ ] <strong>T7.5<\/strong> Wire backend lifecycle controls (start/stop/restart, logs) to the Rust host.<\/li>\n<\/ul>\n<h2 id=\"acceptance-criteria\">Acceptance criteria<\/h2>\n<ul>\n<li>[ ] App launches, provisions backend, and a user can chat with Hermes (streaming) and watch\n      it delegate a coding task to ndcode — through a <strong>thin<\/strong> UI.<\/li>\n<li>[ ] Bundle stays light (Tauri ~10 MB shell; weight is in the provisioned harness, not the\n      installer).<\/li>\n<\/ul>\n<h2 id=\"primary-sources\">Primary sources<\/h2>\n<ul>\n<li>NeuralDeskApp repo (our Tauri shell + signing).<\/li>\n<li><code>github.com/fathah/hermes-desktop<\/code> (chat UX patterns), official Hermes <code>web/<\/code> (settings\n  pages), <code>web/src/lib/api.ts<\/code> (endpoints).<\/li>\n<\/ul>"}, "tasks_01/task_08.md": {"rel": "tasks_01/task_08.md", "area": "tasks_01", "title": "task_08 — Integration & transport (HTTP/SSE, process lifecycle)", "size": 3890, "html": "<h1 id=\"task_08-integration-transport-httpsse-process-lifecycle\">task_08 — Integration &amp; transport (HTTP/SSE, process lifecycle)<\/h1>\n<blockquote>\n<p>Status: <code>build<\/code> · Depends on: task_02, task_03, task_04, task_06 · Blocks: task_07<\/p>\n<\/blockquote>\n<h2 id=\"goal\">Goal<\/h2>\n<p>Define and implement the wiring that makes the pieces one app: who spawns what, on which\nports, and the exact UI⇄Hermes chat transport + Hermes⇄ndcode delegation.<\/p>\n<h2 id=\"process-lifecycle-what-spawns-what\">Process lifecycle (what spawns what)<\/h2>\n<pre><code>Tauri Rust host (app process)\n  ├─ spawn (first run): uv → provision full Hermes into app-data        [task_06]\n  ├─ spawn (each launch): Hermes headless API server (local port)        [task_02/04]\n  │     └─ Hermes, via skill &quot;ndcode&quot;, spawns: ndcode run '&lt;task&gt;'       [task_03]\n  │            └─ ndcode → NeuralDeep hub (models)                        [task_05]\n  └─ Hermes → NeuralDeep hub (models)                                    [task_05]\nUI (WebView) ⇄ Rust host ⇄ Hermes API  (HTTP + SSE)\n<\/code><\/pre>\n<ul>\n<li><strong>Single supervised child from Rust's view:<\/strong> the Hermes server. ndcode is a <em>grandchild<\/em>\n  Hermes spawns itself (its native skill pattern) — Rust just ensures <code>ndcode<\/code> is on Hermes'\n  <code>PATH<\/code> and points at the hub.<\/li>\n<li>Ports: bind Hermes to <strong>loopback only<\/strong>, on a chosen/auto port (avoid clashes — official\n  <code>web/<\/code> uses <code>:9119<\/code>, fathah uses <code>:8642<\/code>; pick one and make it configurable). ndcode, if run\n  as <code>serve<\/code>, uses its own loopback port; if <code>run<\/code>, no port.<\/li>\n<\/ul>\n<h2 id=\"transport-ui-hermes\">Transport: UI ⇄ Hermes<\/h2>\n<ul>\n<li><strong>Resolve the chat route first (task_04 dependency).<\/strong> Two candidates:<\/li>\n<li>fathah-style: POST a message to the local Hermes API, read <strong>SSE<\/strong> token/tool stream\n    (the <code>:8642<\/code> path). Preferred if stable.<\/li>\n<li>official <code>:9119<\/code> + a WebSocket (<code>buildWsUrl<\/code>) if that's where chat actually lives.<\/li>\n<li><strong>Translate to the wrapper's render model:<\/strong> map Hermes' stream events\n  (token delta, tool start/progress/result — including the ndcode delegation steps, usage,\n  done) to the React chat's message/streaming shapes (reuse NeuralDeskApp's <code>StreamMessage<\/code>\n  rendering where it fits).<\/li>\n<li><strong>Auth:<\/strong> loopback session-token injection or <code>--insecure<\/code> loopback (task_02). The desktop\n  is the only client; keep it local and simple.<\/li>\n<\/ul>\n<h2 id=\"transport-hermes-ndcode\">Transport: Hermes ⇄ ndcode<\/h2>\n<ul>\n<li>Via the <strong><code>ndcode<\/code> skill<\/strong> (task_03): Hermes runs <code>ndcode run '&lt;task&gt;'<\/code> (or <code>serve<\/code>),\n  polls/reads output, folds results back into the conversation. We do <strong>not<\/strong> build a separate\n  ndcode bridge in the wrapper — Hermes owns this. The wrapper only <em>renders<\/em> the delegation\n  as tool steps.<\/li>\n<\/ul>\n<h2 id=\"tasks\">Tasks<\/h2>\n<ul>\n<li>[ ] <strong>T8.1<\/strong> Lock the Hermes chat endpoint + streaming event schema (from task_04). Write it\n      down as the integration contract.<\/li>\n<li>[ ] <strong>T8.2<\/strong> Implement the Rust host: spawn/supervise Hermes (env: hub URL/key, ndcode on\n      PATH, app-data dir), health-check, restart, shutdown.<\/li>\n<li>[ ] <strong>T8.3<\/strong> Implement the UI Hermes client: send message, consume SSE, render\n      tokens/tool-steps/usage; stop = abort the Hermes turn.<\/li>\n<li>[ ] <strong>T8.4<\/strong> Verify end-to-end: user prompt → Hermes reasons → delegates a coding task →\n      ndcode runs against the hub → results stream back into chat.<\/li>\n<li>[ ] <strong>T8.5<\/strong> Port selection + collision handling; make Hermes (and ndcode <code>serve<\/code>) ports\n      configurable; loopback-only binding.<\/li>\n<li>[ ] <strong>T8.6<\/strong> Error surfaces: backend down, provisioning incomplete, hub auth failure, ndcode\n      missing — all shown cleanly in the thin UI.<\/li>\n<\/ul>\n<h2 id=\"acceptance-criteria\">Acceptance criteria<\/h2>\n<ul>\n<li>[ ] A single user message can travel UI → Hermes → ndcode → hub → back, streamed, with tool\n      steps visible.<\/li>\n<li>[ ] Clean lifecycle: launch provisions/starts backend; quit stops it; crash restarts it.<\/li>\n<li>[ ] All inter-process traffic is loopback; auth handled.<\/li>\n<\/ul>\n<h2 id=\"open-questions-task_11\">Open questions (→ task_11)<\/h2>\n<ul>\n<li>Exact chat route/port + SSE schema (blocked on task_04 source read).<\/li>\n<li>Does Hermes expose per-turn abort over the local API?<\/li>\n<li>Streaming granularity of ndcode delegation steps as seen by Hermes' stream.<\/li>\n<\/ul>"}, "tasks_01/task_09.md": {"rel": "tasks_01/task_09.md", "area": "tasks_01", "title": "task_09 — Packaging, signing & notarization (Mac + Windows)", "size": 3641, "html": "<h1 id=\"task_09-packaging-signing-notarization-mac-windows\">task_09 — Packaging, signing &amp; notarization (Mac + Windows)<\/h1>\n<blockquote>\n<p>Status: <code>build<\/code> · Depends on: task_06, task_07 · Blocks: ship<\/p>\n<\/blockquote>\n<h2 id=\"goal\">Goal<\/h2>\n<p>Produce signed, installable artifacts on macOS and Windows that bundle the thin shell + the\nnative bits (ndcode, uv) and provision the harness on first run.<\/p>\n<h2 id=\"whats-in-the-bundle\">What's in the bundle<\/h2>\n<ul>\n<li>Tauri shell (<code>.app<\/code> / <code>.exe<\/code>).<\/li>\n<li><code>externalBin<\/code>: <code>ndcode-&lt;triple&gt;<\/code> (Bun-compiled native), <code>uv-&lt;triple&gt;<\/code>.<\/li>\n<li>(Optional offline mode) pre-seeded standalone CPython + Hermes wheels.<\/li>\n<li><strong>Not<\/strong> bundled: the model proxy (external NeuralDeep hub).<\/li>\n<\/ul>\n<h2 id=\"macos-we-already-have-this-working-in-neuraldeskapp-reuse\">macOS (we already have this working in NeuralDeskApp — reuse)<\/h2>\n<ul>\n<li><strong>Developer ID Application:<\/strong> <code>Valeriy Kovalsky (A933C2TJXU)<\/code> — already in keychain.<\/li>\n<li>Sign with <strong>hardened runtime<\/strong> (<code>--options runtime<\/code>) + timestamp; entitlements include\n  <code>allow-jit<\/code>, <code>allow-unsigned-executable-memory<\/code>, <code>disable-library-validation<\/code>, and any\n  device entitlements actually needed (drop unused ones).<\/li>\n<li><strong>Every nested binary must be signed<\/strong>: the main app, the sidecar/host, <code>ndcode<\/code>, <code>uv<\/code>, and\n  (if present) the bundled python. Tauri signs <code>externalBin<\/code> automatically when\n  <code>bundle.macOS.signingIdentity<\/code> is set — verify each with\n  <code>codesign -dvvv … | grep -E 'Authority|flags'<\/code> (expect <code>flags=…(runtime)<\/code>).<\/li>\n<li><strong>Notarize<\/strong> the <code>.app<\/code> and <code>.dmg<\/code>:<\/li>\n<li><code>ditto -c -k --keepParent App.app App.zip<\/code><\/li>\n<li><code>xcrun notarytool submit App.zip --keychain-profile \"&lt;PROFILE&gt;\" --wait<\/code> → <code>Accepted<\/code><\/li>\n<li><code>xcrun stapler staple App.app<\/code><\/li>\n<li>DMG must be <strong>UDIF<\/strong> — if built via <code>makehybrid<\/code>, convert: <code>hdiutil convert hyb.dmg\n    -format UDZO -o App.dmg<\/code>; sign; submit; staple.<\/li>\n<li>Verify: <code>spctl -a -vvv -t exec App.app<\/code> / <code>-t install App.dmg<\/code> → \"Notarized Developer ID\".<\/li>\n<li><strong>BLOCKER (parked):<\/strong> need the <strong>notarytool keychain-profile name<\/strong>\n  (<code>xcrun notarytool store-credentials …<\/code>). Provide it to finish notarization.<\/li>\n<li>First-run provisioning runs <strong>user-writable<\/strong> app-data (not inside the signed <code>.app<\/code>), so it\n  doesn't break the signature/Gatekeeper.<\/li>\n<\/ul>\n<h2 id=\"windows\">Windows<\/h2>\n<ul>\n<li>Tauri MSI/NSIS installer. Code-sign with an Authenticode cert (EV recommended to avoid\n  SmartScreen warnings). Sign <code>ndcode.exe<\/code>, <code>uv.exe<\/code>, the app exe.<\/li>\n<li><code>tauri.conf.json<\/code> <code>bundle.windows<\/code> (digest sha256, timestamp URL) — already templated in\n  NeuralDeskApp.<\/li>\n<li>Decide cert acquisition (EV cert / signing service) — procurement task.<\/li>\n<\/ul>\n<h2 id=\"tasks\">Tasks<\/h2>\n<ul>\n<li>[ ] <strong>T9.1<\/strong> Reuse NeuralDeskApp's macOS signing config + <code>make bundle<\/code> flow; add <code>ndcode<\/code>\n      and <code>uv<\/code> as <code>externalBin<\/code>; confirm all nested binaries are signed (hardened runtime).<\/li>\n<li>[ ] <strong>T9.2<\/strong> Obtain/confirm the <strong>notarytool profile name<\/strong>; run notarize+staple for <code>.app<\/code>\n      and <code>.dmg<\/code>; verify with <code>spctl<\/code>.<\/li>\n<li>[ ] <strong>T9.3<\/strong> Windows: configure MSI/NSIS bundle; acquire Authenticode (EV) cert; sign all\n      binaries; produce a signed installer.<\/li>\n<li>[ ] <strong>T9.4<\/strong> Validate first-run provisioning works on a clean, signed install on both OSes\n      (Gatekeeper-clean on mac; SmartScreen-clean on Windows).<\/li>\n<li>[ ] <strong>T9.5<\/strong> CI: per-platform build matrix (mac arm64/x64, win x64) producing signed\n      artifacts; pin tool versions (task_06 manifest).<\/li>\n<\/ul>\n<h2 id=\"acceptance-criteria\">Acceptance criteria<\/h2>\n<ul>\n<li>[ ] macOS: notarized <code>.app<\/code> + <code>.dmg<\/code>, <code>spctl<\/code> → \"Notarized Developer ID\", opens offline.<\/li>\n<li>[ ] Windows: signed installer, no SmartScreen block (with EV).<\/li>\n<li>[ ] Clean machine → install → first run provisions full harness → chat + ndcode work.<\/li>\n<\/ul>\n<h2 id=\"primary-sources\">Primary sources<\/h2>\n<ul>\n<li>NeuralDeskApp macOS notarization runbook (Developer ID, hardened runtime, notarytool,\n  UDIF DMG conversion) — already proven for <code>Neural Deep Proxy.app<\/code>.<\/li>\n<li>Tauri v2 bundling/signing docs (macOS + Windows).<\/li>\n<\/ul>"}, "tasks_01/task_10.md": {"rel": "tasks_01/task_10.md", "area": "tasks_01", "title": "task_10 — Licensing & commercialization", "size": 3799, "html": "<h1 id=\"task_10-licensing-commercialization\">task_10 — Licensing &amp; commercialization<\/h1>\n<blockquote>\n<p>Status: <code>research<\/code> (mostly done) · Depends on: task_01 · Blocks: ship<\/p>\n<\/blockquote>\n<h2 id=\"goal\">Goal<\/h2>\n<p>Confirm we can legally <strong>rebrand and sell<\/strong> the whole stack, and list the conditions.<\/p>\n<h2 id=\"license-inventory-verified-where-noted\">License inventory (verified where noted)<\/h2>\n<table>\n<thead>\n<tr>\n<th>Component<\/th>\n<th>License<\/th>\n<th>Sell/rebrand?<\/th>\n<th>Condition<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Hermes Agent<\/strong> (NousResearch/hermes-agent)<\/td>\n<td><strong>MIT<\/strong> (verified: LICENSE © 2025 Nous Research; <code>package.json<\/code> license: MIT, <code>private:true<\/code> is just an npm flag)<\/td>\n<td>✅ yes<\/td>\n<td>keep MIT notice + copyright in copies<\/td>\n<\/tr>\n<tr>\n<td><strong>ndcode<\/strong> (vakovalskii/NeuralDeepCode)<\/td>\n<td><strong>MIT<\/strong> (fork of sst/opencode, retains upstream copyright)<\/td>\n<td>✅ yes (it's yours)<\/td>\n<td>keep upstream opencode MIT notice<\/td>\n<\/tr>\n<tr>\n<td><strong>opencode<\/strong> (sst/opencode)<\/td>\n<td>MIT<\/td>\n<td>✅<\/td>\n<td>notice<\/td>\n<\/tr>\n<tr>\n<td><strong>fathah/hermes-desktop<\/strong> (patterns/backend we lift)<\/td>\n<td><strong>MIT<\/strong><\/td>\n<td>✅<\/td>\n<td>notice if we copy code<\/td>\n<\/tr>\n<tr>\n<td><strong>LiteLLM<\/strong> (optional)<\/td>\n<td>MIT<\/td>\n<td>✅<\/td>\n<td>notice<\/td>\n<\/tr>\n<tr>\n<td><strong>uv / python-build-standalone<\/strong><\/td>\n<td>Apache-2.0 / PSF (permissive)<\/td>\n<td>✅<\/td>\n<td>notices<\/td>\n<\/tr>\n<tr>\n<td><strong>Tauri<\/strong><\/td>\n<td>MIT/Apache-2.0<\/td>\n<td>✅<\/td>\n<td>notice<\/td>\n<\/tr>\n<tr>\n<td>Our Tauri shell (from NeuralDeskApp)<\/td>\n<td>ours<\/td>\n<td>✅<\/td>\n<td>—<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>→ <strong>The whole chain is permissive (MIT/Apache/PSF) → sellable under our own brand.<\/strong><\/p>\n<h2 id=\"conditions-gotchas-important-for-sell\">Conditions / gotchas (important for \"sell\")<\/h2>\n<ol>\n<li><strong>Trademark ≠ code.<\/strong> MIT licenses the <em>code<\/em>, not the names/logos \"Hermes\", \"Hermes\n   Agent\", \"Nous Research\", \"opencode\". Ship under <strong>our brand (Neural Deep)<\/strong>; do <strong>not<\/strong>\n   market as \"Hermes\" or imply Nous endorsement. Acceptable: \"powered by Hermes Agent (MIT)\"\n   in credits.<\/li>\n<li><strong>Preserve notices.<\/strong> Bundle a <code>THIRD_PARTY_LICENSES<\/code> / NOTICE file with the MIT texts +\n   copyrights for Hermes, opencode/ndcode, fathah (if code lifted), LiteLLM, uv, Tauri.<\/li>\n<li><strong>Models ≠ harness.<\/strong> These licenses cover the <em>harness code<\/em>. If we ever ship <em>model\n   weights<\/em> (e.g. Nous Hermes models), those have their <strong>own<\/strong> licenses — out of scope here\n   (models come via our proxy, not bundled).<\/li>\n<li><strong>The official Hermes Desktop binary is NOT ours to rebrand<\/strong> — it's a closed prebuilt,\n   gated by Nous Portal credit tiers (Free/Plus/Super/Ultra). We build our own from the MIT\n   sources instead. (Confirmed: no desktop app source in the MIT repo.)<\/li>\n<li><strong>UI we adopt must also be permissive.<\/strong> If we ever reuse a general chat UI, check it:\n   <strong>LibreChat<\/strong> = MIT ✅; <strong>Open WebUI<\/strong> has a <strong>branding-retention clause<\/strong> in recent\n   versions (not pure MIT) ⚠️ — avoid for a sellable rebrand unless terms are met. Our plan\n   builds the UI (task_07), so this is only a caution.<\/li>\n<li><strong>fathah is \"not affiliated with Nous\"<\/strong> and community-maintained — fine to lift under MIT;\n   just attribute if we copy code.<\/li>\n<\/ol>\n<h2 id=\"tasks\">Tasks<\/h2>\n<ul>\n<li>[ ] <strong>T10.1<\/strong> Generate a <code>THIRD_PARTY_LICENSES.md<\/code> aggregating all MIT/Apache/PSF notices.<\/li>\n<li>[ ] <strong>T10.2<\/strong> Add a credits/about line: \"Powered by Hermes Agent and opencode (MIT)\".<\/li>\n<li>[ ] <strong>T10.3<\/strong> Trademark pass: ensure no use of others' marks/logos in branding, store\n      listings, or icon.<\/li>\n<li>[ ] <strong>T10.4<\/strong> If any third-party UI code is copied (fathah patterns), keep its notice.<\/li>\n<li>[ ] <strong>T10.5<\/strong> Confirm the NeuralDeep hub's own ToS permits reselling access via our app (it's\n      yours — just record it).<\/li>\n<\/ul>\n<h2 id=\"acceptance-criteria\">Acceptance criteria<\/h2>\n<ul>\n<li>[ ] A complete, accurate <code>THIRD_PARTY_LICENSES.md<\/code> in the bundle.<\/li>\n<li>[ ] Branding uses only our marks; attributions present where required.<\/li>\n<li>[ ] Documented green-light: \"we may sell this under Neural Deep.\"<\/li>\n<\/ul>\n<h2 id=\"primary-sources\">Primary sources<\/h2>\n<ul>\n<li>Hermes <code>LICENSE<\/code> (MIT © 2025 Nous Research), <code>package.json<\/code> (license MIT, private flag).<\/li>\n<li>ndcode README (MIT, fork of sst/opencode). sst/opencode LICENSE (MIT).<\/li>\n<li>fathah/hermes-desktop (MIT). LiteLLM (MIT). uv (Apache-2.0). Tauri (MIT/Apache-2.0).<\/li>\n<li>Open WebUI license terms (branding clause) — verify before any reuse.<\/li>\n<\/ul>"}, "tasks_01/task_11.md": {"rel": "tasks_01/task_11.md", "area": "tasks_01", "title": "task_11 — Open questions, risks & verification checklist", "size": 3837, "html": "<h1 id=\"task_11-open-questions-risks-verification-checklist\">task_11 — Open questions, risks &amp; verification checklist<\/h1>\n<blockquote>\n<p>Status: <code>tracking<\/code> · Depends on: all · Blocks: ship<\/p>\n<\/blockquote>\n<p>Living list of unknowns to close before/during build, the real risks, and the end-to-end\nverification gate.<\/p>\n<h2 id=\"open-questions-must-answer-before-relying-on-the-design\">Open questions (must answer before relying on the design)<\/h2>\n<table>\n<thead>\n<tr>\n<th>#<\/th>\n<th>Question<\/th>\n<th>Resolved by<\/th>\n<th>Why it matters<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Q1<\/td>\n<td>Exact Hermes <strong>chat route + streaming schema<\/strong> (<code>:8642<\/code> SSE vs <code>:9119<\/code>+WS)<\/td>\n<td>task_04 (read fathah), task_02<\/td>\n<td>The whole UI⇄backend transport<\/td>\n<\/tr>\n<tr>\n<td>Q2<\/td>\n<td>Does Hermes run <strong>fully local, no Nous account<\/strong>, with models from our proxy?<\/td>\n<td>task_02, task_05<\/td>\n<td>Or users are forced onto Nous Portal<\/td>\n<\/tr>\n<tr>\n<td>Q3<\/td>\n<td>Does ndcode still have upstream opencode <strong>headless <code>run<\/code>/<code>serve<\/code><\/strong>?<\/td>\n<td>task_03 (read ndcode source)<\/td>\n<td>If not, Hermes can't drive it autonomously<\/td>\n<\/tr>\n<tr>\n<td>Q4<\/td>\n<td><strong>Non-interactive<\/strong> hub auth for ndcode (key env vs browser <code>/login<\/code>)?<\/td>\n<td>task_03, task_05<\/td>\n<td>Headless ndcode can't do SSO<\/td>\n<\/tr>\n<tr>\n<td>Q5<\/td>\n<td>Exact Hermes <strong>config keys<\/strong> for a custom OpenAI-compatible provider<\/td>\n<td>task_05, task_02<\/td>\n<td>Points the core at our proxy<\/td>\n<\/tr>\n<tr>\n<td>Q6<\/td>\n<td>Is the <code>:8642<\/code>/chat path a <strong>stable<\/strong> Hermes server mode or internals-coupled?<\/td>\n<td>task_04<\/td>\n<td>Fragility vs maintainability (#1925/#2491)<\/td>\n<\/tr>\n<tr>\n<td>Q7<\/td>\n<td>Does Hermes support <strong>per-turn abort<\/strong> over the local API?<\/td>\n<td>task_08<\/td>\n<td>\"Stop\" button<\/td>\n<\/tr>\n<tr>\n<td>Q8<\/td>\n<td>macOS <strong>notarytool profile name<\/strong><\/td>\n<td>user input<\/td>\n<td>Notarization is otherwise blocked<\/td>\n<\/tr>\n<tr>\n<td>Q9<\/td>\n<td>Windows <strong>Authenticode (EV) cert<\/strong> acquisition<\/td>\n<td>task_09<\/td>\n<td>SmartScreen-clean installer<\/td>\n<\/tr>\n<tr>\n<td>Q10<\/td>\n<td>Can <code>ndcode<\/code> be <code>bun build --compile<\/code>'d to a single native binary?<\/td>\n<td>task_03<\/td>\n<td>Clean bundling<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"risks\">Risks<\/h2>\n<ul>\n<li><strong>Hermes chat API not yet stable<\/strong> (decoupling tracked upstream #1925/#2491). Wrappers reach\n  into internals → our transport may break on Hermes updates. <em>Mitigation:<\/em> pin a Hermes\n  version in the provisioning manifest (task_06); isolate the transport behind one adapter.<\/li>\n<li><strong>Python provisioning fragility<\/strong> on user machines. <em>Mitigation:<\/em> uv + standalone CPython\n  (no system Python dependency); offline pre-seed option; clear first-run error UX.<\/li>\n<li><strong>Two heavy runtimes<\/strong> (Python for Hermes, Bun/native for ndcode). <em>Mitigation:<\/em> ndcode as a\n  single compiled binary; Python only via uv.<\/li>\n<li><strong>Bundle size / signing surface<\/strong> (multiple nested binaries to sign+notarize). <em>Mitigation:<\/em>\n  reuse NeuralDeskApp's proven signing; keep the offline Python blob optional.<\/li>\n<li><strong>Nous account creep<\/strong> — risk that some Hermes features assume Nous Portal. <em>Mitigation:<\/em>\n  verify account-less local run (Q2) early; gate features that require it.<\/li>\n<li><strong>Trademark<\/strong> — must ship under Neural Deep only (task_10).<\/li>\n<\/ul>\n<h2 id=\"end-to-end-verification-gate-before-calling-it-done\">End-to-end verification gate (before calling it done)<\/h2>\n<ul>\n<li>[ ] Clean macOS machine: install signed/notarized app → first run provisions full Hermes via\n      uv → headless API healthy → chat streams → Hermes delegates a coding task → ndcode runs\n      against the NeuralDeep hub → result streams back. <code>spctl<\/code> clean, opens offline.<\/li>\n<li>[ ] Clean Windows machine: same flow with signed installer, no SmartScreen block.<\/li>\n<li>[ ] One hub base URL+key drives <strong>both<\/strong> Hermes and ndcode (Q2/Q5 verified at runtime).<\/li>\n<li>[ ] Memory/skills persist across restarts; ndcode delegation visible as tool steps.<\/li>\n<li>[ ] <code>THIRD_PARTY_LICENSES.md<\/code> present; branding is Neural Deep only.<\/li>\n<\/ul>\n<h2 id=\"immediate-next-actions-highest-leverage-first\">Immediate next actions (highest leverage first)<\/h2>\n<ol>\n<li><strong>Read fathah/hermes-desktop source<\/strong> → resolve Q1, Q2, Q5, Q6 (task_04). <em>This unblocks\n   the transport and provisioning.<\/em><\/li>\n<li><strong>Read ndcode source<\/strong> → resolve Q3, Q4, Q10 (task_03). <em>This unblocks the coding worker.<\/em><\/li>\n<li>Stand up a local headless Hermes pointed at the NeuralDeep hub (task_02 + task_05) as a\n   manual spike — prove the backend works before any UI.<\/li>\n<li>Then scaffold the Tauri wrapper from NeuralDeskApp (task_07) and wire transport (task_08).<\/li>\n<\/ol>"}}, "nodes": [{"id": "area::(root)", "label": "(root)", "kind": "area", "area": "(root)", "size": 0, "lvl": 1, "ang": 2.9249, "root": false}, {"id": "area::app", "label": "app", "kind": "area", "area": "app", "size": 0, "lvl": 4, "ang": 0.1083, "root": false}, {"id": "area::docs", "label": "docs", "kind": "area", "area": "docs", "size": 0, "lvl": 2, "ang": 3.1416, "root": false}, {"id": "area::docs/decisions", "label": "docs/decisions", "kind": "area", "area": "docs/decisions", "size": 0, "lvl": 3, "ang": 3.3583, "root": false}, {"id": "area::docs/guides", "label": "docs/guides", "kind": "area", "area": "docs/guides", "size": 0, "lvl": 2, "ang": 5.5249, "root": false}, {"id": "area::docs/reference", "label": "docs/reference", "kind": "area", "area": "docs/reference", "size": 0, "lvl": 2, "ang": 5.9582, "root": false}, {"id": "area::docs/services", "label": "docs/services", "kind": "area", "area": "docs/services", "size": 0, "lvl": 3, "ang": 5.0915, "root": false}, {"id": "area::docs/services/desktop-app", "label": "docs/services/desktop-app", "kind": "area", "area": "docs/services/desktop-app", "size": 0, "lvl": 3, "ang": 5.3082, "root": false}, {"id": "area::skills", "label": "skills", "kind": "area", "area": "skills", "size": 0, "lvl": 2, "ang": 6.1749, "root": false}, {"id": "area::tasks_01", "label": "tasks_01", "kind": "area", "area": "tasks_01", "size": 0, "lvl": 4, "ang": 0.325, "root": false}, {"id": "CLAUDE.md", "label": "Neural Deep Desktop — entry point", "kind": "doc", "area": "(root)", "size": 1289, "rel": "CLAUDE.md", "lvl": 0, "ang": 3.1416, "root": true}, {"id": "README.md", "label": "Neu  if(G.drag){const w=tw(mx,my);G.drag.x=w.x;G.drag.y=w.y;if(G.ds&&Math.abs(e.clientX-G.ds.x)+Math.abs(e.clientY-G.ds.y)>4)G.moved=true;return;}
 if(G.pan){G.view.x=G.pan.vx+(e.clientX-G.pan.x);G.view.y=G.pan.vy+(e.clientY-G.pan.y);return;}
 const n=pick(mx,my);G.hover=n;const tip=$('#tip');if(n){tip.style.display='block';tip.style.left=(mx+16)+'px';tip.style.top=(my+12)+'px';
  tip.innerHTML='<div>'+esc(n.root?DATA.root:n.label)+'</div><div class="s">'+esc(n.kind==='area'?n.area:(n.rel||'')+' · '+n.lvl+' шаг(ов)')+'</div>';}else tip.style.display='none';});
addEventListener('mouseup',()=>{if(G.drag){const n=G.drag;G.drag=null;if(!G.moved&&n.kind==='doc'){document.querySelector('.tab[data-v=browse]').click();open(n.rel);}}G.pan=null;});
cv.addEventListener('wheel',e=>{e.preventDefault();const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,f=e.deltaY<0?1.12:.89,w=tw(mx,my);G.view.k=Math.max(.3,Math.min(5,G.view.k*f));G.view.x=mx-w.x*G.view.k;G.view.y=my-w.y*G.view.k;},{passive:false});
$('#reheat').onclick=()=>{if(!G.on)return;layout();G.nodes.forEach(n=>{n.x=G.cx;n.y=G.cy;n.vx=0;n.vy=0;});G.grow=0;};
$('#physics').onchange=()=>{if(!$('#physics').checked&&G.on){layout();G.grow=1;}};
open(DATA.files[DATA.root]?DATA.root:Object.keys(F)[0]);
</script></body></html>
